query_templates:
  query_templates:
    description: 'Domain-agnostic Cypher query templates from universal_graph_schema.json.
      Domain packs override with domain-specific node labels, edge types, and filter
      predicates in domains/{domain}/queries/ override files.

      '
    location: app/graph/queries/templates/
    templates:
    - name: capability_match_template
      file: app/graph/queries/templates/capability_match.cypher
      archetype: capability_match
      description: Filter candidates by hard capability requirements
      cypher_pattern: 'MATCH (query)-[cap:$CAPABILITY_EDGE]->(candidate)

        WHERE cap.strength >= $min_strength AND cap.gating = true

        RETURN candidate

        '
    - name: similarity_discovery_template
      file: app/graph/queries/templates/similarity_discovery.cypher
      archetype: similarity_relationship
      description: Find similar entities via collaborative or embedding signals
      cypher_pattern: "MATCH (entity1)-[sim:$SIMILARITY_EDGE]->(entity2)\nWHERE sim.similarity_score\
        \ >= $min_score\n  AND sim.method = $method\nRETURN entity2, sim.similarity_score\n\
        ORDER BY sim.similarity_score DESC\n"
    - name: historical_success_template
      file: app/graph/queries/templates/historical_success.cypher
      archetype: historical_success
      description: Rank by recency-weighted historical success
      cypher_pattern: "MATCH (query)-[success:$SUCCESS_EDGE]->(candidate)\nWHERE success.outcome\
        \ = 'positive'\n  AND success.timestamp > datetime() - duration({days: $lookback_days})\n\
        RETURN candidate,\n  avg(success.confidence) AS avg_confidence,\n  count(success)\
        \ AS success_count\nORDER BY success_count DESC, avg_confidence DESC\n"
    - name: cooccurrence_affinity_template
      file: app/graph/queries/templates/cooccurrence_affinity.cypher
      archetype: co_occurrence
      description: Find co-occurring candidates with lift > threshold
      cypher_pattern: 'MATCH (candidateA)-[co:$COOCCURRENCE_EDGE]->(candidateB)

        WHERE co.lift >= $min_lift AND co.frequency >= $min_frequency

        RETURN candidateB, co.lift, co.frequency

        ORDER BY co.lift DESC, co.frequency DESC

        '
    - name: exclusion_check_template
      file: app/graph/queries/templates/exclusion_check.cypher
      archetype: exclusion_relationship
      description: Remove excluded candidates before scoring
      cypher_pattern: "MATCH (query)-[excl:$EXCLUSION_EDGE]->(candidate)\nWHERE excl.permanent\
        \ = true\n  OR excl.timestamp > datetime() - duration({days: $exclusion_window_days})\n\
        RETURN candidate.id AS excluded_id\n"
    - name: context_disambiguation_template
      file: app/graph/queries/templates/context_disambiguation.cypher
      archetype: context_relationship
      description: Disambiguate query entity via context signals
      cypher_pattern: "MATCH (query)-[ctx:$CONTEXT_EDGE]->(context)\nWHERE ctx.signal_strength\
        \ >= $min_confidence\nWITH query, collect(context) AS context_signals\nMATCH\
        \ (query)-[:COULD_BE]->(candidate)\nMATCH (candidate)-[support:SUPPORTS_ENTITY]->(ctx_signal)\n\
        WHERE ctx_signal IN context_signals\nRETURN candidate,\n  sum(support.strength\
        \ * ctx_signal.signal_strength) AS disambiguation_score\nORDER BY disambiguation_score\
        \ DESC\nLIMIT 1\n"
rollout:
  patch001_rollout:
    description: Rollout phases for PATCH-001 additions
    phase_E:
      id: E
      name: Behavioral + Certification Topology
      week: 5
      layers:
      - behavioral_history
      - certification_topology
      risk: low
      adds:
        nodes:
        - Certification
        edges:
        - PROCESSEDPOLYMER
        - CERTIFIEDFOR
        jobs:
        - reinforcement_polymer_history
      files: 5
      validation:
      - matchstrict.cypher identical results
      - "PROCESSEDPOLYMER edge count \u2264 ACCEPTSPOLYMER edge count"
      - "Certification node count \u2264 6 (static bootstrap)"
      - CERTIFIEDFOR edges match boolean property audit
    phase_F:
      id: F
      name: Community + Form Topology
      week: 6
      layers:
      - community_topology
      - form_similarity
      risk: medium
      adds:
        nodes:
        - Community
        edges:
        - COMMUNITYMEMBER
        - COPROCESSEDWITH
        jobs:
        - community_membership
        - form_cooccurrence
      files: 6
      validation:
      - matchstrict.cypher identical results
      - Community node count = distinct louvaincommunityid values
      - COMMUNITYMEMBER edge count = n_facilities (1:1)
      - louvaincommunityid property UNCHANGED
      - "COPROCESSEDWITH edge count within [0, n_forms \xD7 5]"
    phase_G:
      id: G
      name: Capability Similarity + Competition
      week: 7
      layers:
      - capability_similarity
      - competitive_intelligence
      risk: medium
      adds:
        edges:
        - CAPABILITYSIMILAR
        - COMPETESWITH
        jobs:
        - capability_similarity
        - competitive_overlap
      files: 4
      validation:
      - matchstrict.cypher identical results
      - "CAPABILITYSIMILAR count \u2264 n_facilities \xD7 15"
      - "COMPETESWITH count \u2264 n_facilities \xD7 10"
      - Neo4j heap < 70%
    phase_H:
      id: H
      name: Trade Flow + Multi-Hop + Re-Ranking
      week: 8
      layers:
      - trade_flow
      - multihop_traversal
      - realtime_reranking
      risk: medium-high
      adds:
        edges:
        - SUPPLIEDTOMARKET
        endpoints:
        - POST /v1/discover
        - POST /v1/match (realtime_context extension)
        jobs:
        - market_supply_aggregation
        - churn_detection
      files: 12
      validation:
      - matchstrict.cypher identical results (without realtime_context)
      - /v1/match with realtime_context returns reranked=true
      - /v1/discover returns candidates not in /v1/match results
      - Churn detection webhook fires for test entity
