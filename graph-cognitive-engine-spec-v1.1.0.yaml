specversion: 1.1.0
projectname: L9 Graph Cognitive Matching Engine
description: 'Domain-agnostic graph-native cognitive engine for gate-then-score matching,
  bidirectional entity relationships, collaborative filtering, KGE-powered similarity,
  and multi-tenant SaaS deployment. Designed for vertical AI product foundries.

  '
architecture:
  core:
    framework: FastAPI 0.109+
    language: Python 3.11+
    database: Neo4j 5.x Enterprise
    gds: Neo4j Graph Data Science 2.6+
    async: neo4j-driver asyncio
    scheduler: APScheduler 3.10+ (AsyncIOScheduler)
    testing: pytest + testcontainers-neo4j
    deployment: Docker + Kubernetes / ECS / Cloud Run
  patterns:
    tenancy: database-per-tenant (Neo4j multi-database)
    configloading: filesystem YAML domain packs
    gatecompilation: compile-time Cypher generation
    scoringassembly: runtime WITH clause construction
    kgeintegration: ensemble (Cypher + KGE embeddings)
    compliance: compile-time + runtime prohibited factor blocking
  interfaces:
    ingress: Single FastAPI app, universal /v1/match endpoint
    tenantresolution: X-Domain-Key header OR subdomain OR API key prefix
    sync: POST /v1/sync/{entity_type} (UNWIND MERGE/MATCH SET)
    outcomes: POST /v1/outcomes (reinforcement feedback loop)
    admin: POST /v1/admin/rebuild (GDS + KGE recompute)
invariants:
- Every domain is a standalone Neo4j database (no cross-tenant queries).
- All gate logic compiles to Cypher WHERE clauses (no post-filter in Python).
- Scoring dimensions assemble into a single WITH clause (no iterative scoring).
- KGE embeddings are domain-specific (trained per tenant, no shared embeddings).
- Compliance checks block prohibited factors at compile-time (gate validation).
- NULL semantics are deterministic per gate type (pass/fail/configurable).
- Bidirectional matching inverts gates automatically (invertible: true).
- GDS jobs are declarative (schedule, projection, write target in YAML).
- Plugins extend behavior without modifying core engine code.
- IaC is required (no manual infrastructure setup).
units:
  system: custom
  definitions:
    currency:
      display: USD
      storage: USD
      tostorage: 1.0
      fromstorage: 1.0
    percentage:
      display: percent
      storage: decimal
      tostorage: 0.01
      fromstorage: 100.0
    time:
      display: days
      storage: days
      tostorage: 1.0
      fromstorage: 1.0
    distance:
      display: miles
      storage: meters
      tostorage: 1609.34
      fromstorage: 0.000621371
    weight:
      display: pounds
      storage: kilograms
      tostorage: 0.453592
      fromstorage: 2.20462
    temperature:
      display: fahrenheit
      storage: celsius
      conversionformula:
        tostorage: (value - 32.0) * 5.0 / 9.0
        fromstorage: value * 9.0 / 5.0 + 32.0
    rate_per_distance:
      display: USD/mile
      storage: USD_per_meter
      components:
        numerator: currency
        denominator: distance
    concentration:
      display: ppm
      storage: ppm
      tostorage: 1.0
      fromstorage: 1.0
    viscosity:
      display: g_per_10min
      storage: g_per_10min
      tostorage: 1.0
      fromstorage: 1.0
gatetypes:
- name: range
  description: Candidate property falls within [min, max] from query.
  parameters:
  - candidateprop
  - queryparam_min
  - queryparam_max
  - nullbehavior
  invertible: true
  cypher_template: candidate.{candidateprop} >= {queryparam_min} AND candidate.{candidateprop}
    <= {queryparam_max}
- name: threshold
  description: Candidate property meets minimum/maximum threshold.
  parameters:
  - candidateprop
  - queryparam
  - operator
  - nullbehavior
  invertible: true
  cypher_template: candidate.{candidateprop} {operator} {queryparam}
- name: boolean
  description: Boolean flag match (true/false or presence).
  parameters:
  - candidateprop
  - queryparam
  - nullbehavior
  invertible: false
  cypher_template: candidate.{candidateprop} = {queryparam}
- name: composite
  description: Logical combination of multiple sub-gates (AND/OR).
  parameters:
  - subgates
  - logic
  - nullbehavior
  invertible: false
  cypher_template: ({subgate_1}) {logic} ({subgate_2}) ...
- name: enummap
  description: Query enum value maps to candidate's allowed set.
  parameters:
  - candidateprop
  - queryparam
  - mapping
  - nullbehavior
  invertible: false
  cypher_template: '{queryparam} IN candidate.{candidateprop}'
- name: exclusion
  description: Blocks matches based on exclusion edges (e.g., BLACKLISTED).
  parameters:
  - edgetype
  - fromnode
  - tonode
  - nullbehavior
  invertible: false
  cypher_template: NOT EXISTS((query)-[:{edgetype}]->(candidate))
- name: selfrange
  description: Candidate's own property range contains query value.
  parameters:
  - candidateprop_min
  - candidateprop_max
  - queryparam
  - nullbehavior
  invertible: false
  cypher_template: '{queryparam} >= candidate.{candidateprop_min} AND {queryparam}
    <= candidate.{candidateprop_max}'
- name: freshness
  description: Candidate data must be fresher than threshold.
  parameters:
  - candidateprop
  - maxagedays
  - nullbehavior
  invertible: false
  cypher_template: duration.between(candidate.{candidateprop}, datetime()).days <=
    {maxagedays}
- name: temporalrange
  description: Candidate's temporal window overlaps with query window.
  parameters:
  - candidateprop_start
  - candidateprop_end
  - queryparam_start
  - queryparam_end
  - nullbehavior
  invertible: true
  cypher_template: candidate.{candidateprop_start} <= {queryparam_end} AND candidate.{candidateprop_end}
    >= {queryparam_start}
- name: traversal
  description: Gate checks condition on a traversed relationship or node.
  parameters:
  - pattern
  - condition
  - nullbehavior
  invertible: false
  cypher_template: EXISTS {{ MATCH {pattern} WHERE {condition} }}
scoringcomputationtypes:
- name: geodecay
  description: 'Distance-based decay: 1 / (1 + d / k)'
  parameters:
  - candidateprop_lat
  - candidateprop_lon
  - queryparam_lat
  - queryparam_lon
  - decayconstant
  formula: '1.0 / (1.0 + point.distance(point({latitude: candidate.lat, longitude:
    candidate.lon}), point({latitude: query.lat, longitude: query.lon})) / {decayconstant})'
- name: lognormalized
  description: 'Log-normalized count: ln(1 + x) / ln(1 + max)'
  parameters:
  - candidateprop
  - maxvalue
  formula: ln(1 + candidate.{candidateprop}) / ln(1 + {maxvalue})
- name: communitymatch
  description: Multiplicative bias when entities share Louvain community.
  parameters:
  - candidateprop
  - queryprop
  - bias
  formula: CASE WHEN candidate.{candidateprop} = query.{queryprop} THEN {bias} ELSE
    1.0 END
- name: inverselinear
  description: Lower-is-better linear score (e.g., wait time, price).
  parameters:
  - candidateprop
  - minvalue
  - maxvalue
  formula: 1.0 - (candidate.{candidateprop} - {minvalue}) / ({maxvalue} - {minvalue})
- name: candidateproperty
  description: Pass-through of candidate property (e.g., quality score).
  parameters:
  - candidateprop
  formula: candidate.{candidateprop}
- name: weightedrate
  description: Count+rate aggregation with recency weighting.
  parameters:
  - countalias
  - ratealias
  - countweight
  - rateweight
  formula: '{countweight} * {countalias} + {rateweight} * {ratealias}'
- name: pricealignment
  description: Price scoring vs query/benchmark (lower/higher/closest is better).
  parameters:
  - candidateprop
  - queryparam
  - direction
  formula: CASE WHEN '{direction}' = 'lower' THEN 1.0 / (1.0 + candidate.{candidateprop}
    / {queryparam}) ELSE ... END
- name: temporalproximity
  description: Time-remaining / time-since event scoring.
  parameters:
  - candidateprop
  - queryparam
  - direction
  formula: CASE WHEN '{direction}' = 'remaining' THEN duration.between(datetime(),
    candidate.{candidateprop}).days / {queryparam} ELSE ... END
- name: customcypher
  description: Escape hatch for arbitrary Cypher expressions.
  parameters:
  - expression
  formula: '{expression}'
- description: "Post-match dynamic re-ranking using session/real-time context signals.\
    \ Base graph relevance score + real-time context signals \u2192 dynamic re-ranking\
    \ \u2192 higher conversion than static scoring. Proven at Google ($175B \u2014\
    \ query intent shifts in-session), Amazon ($200B \u2014 cart context \u2192 20-40%\
    \ AOV increase), Meta ($135B \u2014 scroll speed/hover time \u2192 14% impression\
    \ increase).\n"
  leverage_score: 8
  revenue_proof:
    google: "Query intent shifts in real-time; search 'apple' after 'iphone' \u2192\
      \ Apple Inc. favored"
    amazon: "Cart context adjusts recommendations; added laptop \u2192 prioritize\
      \ accessories; 20-40% AOV increase"
    meta: Real-time behavior (scroll speed, hover, video watch) adjusts ad delivery;
      14% impression increase
  trigger: post_match
  activation: conditional
  activation_condition: request.realtime_context IS NOT NULL
  context_schema:
    name: RealTimeContext
    description: 'Domain-portable real-time context payload. Domain packs map their
      specific fields into this universal schema.

      '
    fields:
    - name: urgency
      type: string
      enum:
      - normal
      - high
      - urgent
      default: normal
      description: Caller-declared urgency level
      weight_map:
        normal: 1.0
        high: 1.5
        urgent: 2.0
    - name: capacity_signals
      type: map<string, float>
      nullable: true
      description: "Candidate-level capacity overrides. Keys are candidate_entity\
        \ IDs, values are 0.0\u20131.0 capacity utilization. Domain packs populate:\
        \ PlasticOS \u2192 facility.currentCapacityPct, MortgageOS \u2192 lo.pipelineCapacityPct.\n"
    - name: performance_signals
      type: map<string, float>
      nullable: true
      description: "Candidate-level recent performance. Keys are candidate_entity\
        \ IDs, values are 0.0\u20131.0 recent success rate. Domain packs populate:\
        \ PlasticOS \u2192 facility 7-day success count, MortgageOS \u2192 lender\
        \ 30-day approval rate.\n"
    - name: freshness_signals
      type: map<string, float>
      nullable: true
      description: "Time-sensitive data freshness. Keys are candidate_entity IDs,\
        \ values are hours since last update. Domain packs populate: PlasticOS \u2192\
        \ facility last transaction age, MortgageOS \u2192 rate sheet freshness hours.\n"
    - name: session_actions
      type: list<SessionAction>
      nullable: true
      description: 'Ordered list of actions in current session for sequence-aware
        ranking. Enables session-context disambiguation (Google pattern).

        '
  session_action_schema:
    name: SessionAction
    fields:
    - name: action_type
      type: string
      description: Domain-defined action type (e.g., 'viewed_candidate', 'rejected_candidate',
        'refined_query')
    - name: entity_id
      type: string
      description: ID of entity involved in action
    - name: timestamp
      type: datetime
    - name: metadata
      type: map<string, any>
      nullable: true
  algorithm:
    name: context_reranking
    type: gradient_boosted_trees
    implementation: xgboost
    description: 'Combines base graph score with real-time context features. Model
      trained on historical match outcomes with context features. Falls back to linear
      combination if model not yet trained.

      '
    feature_vector:
    - name: base_graph_score
      source: scoring_assembly.final_score
      description: Pre-computed score from gate-then-score pipeline
    - name: urgency_multiplier
      source: context_schema.urgency.weight_map
    - name: capacity_score
      source: 1.0 - capacity_signals[candidate_id]
      description: "Inverted: lower utilization \u2192 higher score"
    - name: performance_score
      source: performance_signals[candidate_id]
    - name: freshness_score
      source: exp(-freshness_signals[candidate_id] / freshness_halflife_hours)
      default_halflife_hours: 24
    - name: session_recency_bias
      source: 1.0 if candidate_id in last 3 session_actions else 0.0
      description: Boost candidates user recently interacted with
    fallback_formula: "final_score = base_graph_score\n  \xD7 urgency_multiplier\n\
      \  \xD7 (1.0 + performance_score \xD7 0.1)\n  \xD7 (1.0 + (1.0 - capacity_utilization)\
      \ \xD7 0.2)\n  \xD7 freshness_score\n"
    fallback_description: "Linear combination used when XGBoost model is not yet trained.\
      \ Multiplicative \u2014 each factor scales the base score.\n"
    training:
      target: transaction_outcome_success
      features: feature_vector
      retrain_cadence: weekly
      min_training_samples: 500
      model_storage: app/models/reranking/
      model_file: reranking_model.xgb
  api_contract:
    request_extension:
      field: realtime_context
      type: RealTimeContext
      nullable: true
      added_to: POST /v1/match
      description: Optional field added to match request schema
    response_extension:
      field: reranked
      type: boolean
      description: True if real-time re-ranking was applied
      added_to: match response metadata
  domain_pack_mapping:
    description: 'Domain packs override field mappings in their domain_spec.yaml under
      plugins.post_match_hooks.realtime_rerank.field_mapping

      '
    plasticos_example:
      urgency: intake.urgency
      capacity_signals: facility.currentCapacityPct from sync endpoint
      performance_signals: facility 7-day RECENTLYTRANSACTEDWITH success count
      freshness_signals: facility last RECENTLYTRANSACTEDWITH.lasttxndate age in hours
    mortgageos_example:
      urgency: borrower.urgency
      capacity_signals: lo.pipelineCapacityPct
      performance_signals: lender 30-day approval rate from LENDERPERFORMANCE
      freshness_signals: ratesheet.date age in hours
  files:
  - app/scoring/reranking.py
  - app/models/realtime_context.py
  - app/models/reranking/reranking_model.xgb
  - tests/test_reranking.py
  name: realtime_reranking
- description: "Transitive relationship discovery via 2-3 hop graph traversal. Direct\
    \ 1-hop relationships insufficient \u2192 multi-hop traversal discovers transitive/indirect\
    \ relationships \u2192 expands addressable candidate space. Proven at Google ($175B\
    \ \u2014 2-hop semantic ad matching), Amazon ($200B \u2014 2-3 hop co-purchase\
    \ discovery, 35% of revenue), Meta ($135B \u2014 social proof propagation, 3-5x\
    \ engagement vs cold).\n"
  leverage_score: 8
  revenue_proof:
    google: "Entity \u2192 Related Entity \u2192 Ad; 2-hop semantic matching captures\
      \ indirect relevance"
    amazon: "Customer \u2192 Product A \u2192 Product B \u2190 Other Customers; 2-3\
      \ hop co-purchase; 35% of revenue"
    meta: "User \u2192 Friend \u2192 Page; social proof propagation; 3-5x engagement\
      \ vs cold ads"
  node_types:
  - name: source_entity
    role: query/customer starting point
  - name: intermediate_entity
    role: bridge node connecting source to target
  - name: target_candidate
    role: indirectly related entity discovered via traversal
  edge_types:
  - name: DIRECT_RELATIONSHIP
    description: "1-hop (customer \u2192 purchased product)"
  - name: TRANSITIVE_RELATIONSHIP
    description: "2-hop (customer \u2192 product A \u2192 product B)"
  - name: BRIDGE_RELATIONSHIP
    description: Intermediate entity connects source to target
  algorithm:
    name: path_score_aggregation
    type: multiplicative_decay
    description: "BFS/DFS with depth limit (2-3 hops) \u2192 accumulate path scores\
      \ via multiplicative edge weights \u2192 rank candidates by path strength \u2192\
      \ return top-K.\n"
    max_depth: 3
    min_path_strength: 0.1
    path_score_formula: "path_score = PRODUCT(\n  coalesce(rel.strength, 0.8) \xD7\
      \ coalesce(rel.success_rate, 0.7)\n  FOR rel IN relationships(path)\n)\n"
    recency_adjustment: "age_adjusted_score = path_score \xD7 exp(-max_age_days /\
      \ recency_halflife_days)\n"
    default_recency_halflife_days: 180
  traversal_template:
    description: 'Domain-agnostic Cypher template. Domain packs substitute node labels,
      edge types, and filter predicates via their domain_spec.yaml override file at
      domains/{domain}/queries/multihop_discovery.cypher

      '
    cypher: "// Universal multi-hop transitive discovery template\n// Domain packs\
      \ replace: $SOURCE_LABEL, $BRIDGE_EDGES, $TARGET_LABEL,\n//   $SIMILARITY_TYPE,\
      \ $SUCCESS_TYPE, $CAPABILITY_TYPE, $FILTER\nMATCH path = (source:$SOURCE_LABEL\
      \ {id: $source_id})\n  -[sim:$SIMILARITY_TYPE]->(similar_source)\n  -[success:$SUCCESS_TYPE\
      \ {outcome: 'positive'}]->(bridge)\n  -[cap:$CAPABILITY_TYPE]->(target:$TARGET_LABEL)\n\
      WHERE NOT EXISTS((source)-[:TRANSACTED_WITH]->(target))\n  AND $FILTER\nWITH\
      \ target, path,\n  reduce(score = 1.0, rel IN relationships(path) |\n    score\
      \ * coalesce(rel.strength, 0.8) * coalesce(rel.success_rate, 0.7)\n  ) AS transitive_score,\n\
      \  count(DISTINCT bridge) AS bridge_count\nRETURN target,\n  transitive_score,\n\
      \  bridge_count,\n  [node IN nodes(path) | node.id] AS path_trace\nORDER BY\
      \ transitive_score DESC, bridge_count DESC\nLIMIT $max_results\n"
  scoring_dimension:
    name: transitive_compatibility
    description: 'New scoring dimension derived from multi-hop traversal. Captures
      indirect compatibility signals invisible to 1-hop matching.

      '
    weight: configurable_per_domain
    default_weight: 0.1
    source: multihop_traversal.transitive_score
    integration: 'Added as optional 5th scoring dimension in scoring_assembly. Domains
      enable via domain_spec.yaml scoring.dimensions.transitive_compatibility. When
      disabled, weight redistributed to existing 4 dimensions.

      '
  api_contract:
    endpoint: POST /v1/discover
    description: 'Dedicated discovery endpoint separate from /v1/match. Returns candidates
      reachable via multi-hop traversal that would NOT appear in standard 1-hop gate-then-score
      matching.

      '
    request_schema:
      source_entity_id: string
      max_hops: int
      min_path_strength: float
      max_results: int
      include_path_trace: boolean
    response_schema:
      candidates:
      - candidate_id: string
        transitive_score: float
        bridge_count: int
        path_trace: list<string>
        discovery_type: string
  domain_pack_mapping:
    plasticos:
      source: MaterialIntake
      similarity_type: SIMILAR_TO
      success_type: TRANSACTED_WITH
      capability_type: CANPROCESS
      target: Facility
      filter: target.facilityRole IN ['processor', 'compounder']
      description: "Supplier \u2192 Past Facility A \u2192 Material Type B \u2192\
        \ Facility C. Supplier hasn't worked with Facility C, but Facility A successfully\
        \ processed Material Type B, and Facility C excels at Material Type B.\n"
    mortgageos:
      source: BorrowerProfile
      similarity_type: SIMILAR_TO
      success_type: APPLICATION
      capability_type: LENDER_PERFORMANCE
      target: LoanProduct
      filter: target.status = 'active'
      description: "Borrower \u2192 Similar Borrower A \u2192 Closed Loan with Lender\
        \ B \u2192 Lender B strong in Loan Category C \u2192 prioritize Lender B.\n"
  files:
  - app/graph/queries/multihop_discovery.cypher
  - app/scoring/path_aggregation.py
  - app/api/v1/discover.py
  - tests/test_multihop_traversal.py
  name: multihop_traversal
- description: "Churn prediction via engagement graph patterns. Weakening edge strengths\
    \ and dormant nodes signal churn risk. Proven at Google (entity-based bidding\
    \ lock-in), Amazon (re-purchase recommendations), Meta (engagement graph \u2192\
    \ re-engagement campaigns), Gong (deal risk detection via engagement graph), Gainsight\
    \ (health score graph).\n"
  leverage_score: 8
  revenue_proof:
    google: Entity-based bidding creates advertiser lock-in (switching cost)
    amazon: Re-purchase recommendations drive repeat customer behavior
    meta: "Engagement graph predicts churn \u2192 re-engagement campaigns"
    gong: "Deal risk detection via engagement graph \u2192 flag at-risk deals"
    gainsight: "Health score graph (usage + support + NPS + billing) \u2192 expansion/churn\
      \ detection"
  revenue_formula: "Retained revenue = At-risk LTV \xD7 (1 - Churn rate after intervention)"
  signals:
  - name: declining_transaction_frequency
    description: RECENTLYTRANSACTEDWITH.txncount90d declining over 3+ periods
    edge: RECENTLYTRANSACTEDWITH
    detection: txncount90d < 50% of 180-day rolling average
    severity: HIGH
  - name: dormant_relationship
    description: RECENTLYTRANSACTEDWITH edge pruned (recency_score < 0.1)
    edge: RECENTLYTRANSACTEDWITH
    detection: "Edge absence \u2014 previously existed, now pruned"
    severity: CRITICAL
  - name: declining_success_rate
    description: ACCEPTEDMATERIALFROM.successrate declining
    edge: ACCEPTEDMATERIALFROM
    detection: successrate dropped >20% from 180-day baseline
    severity: MEDIUM
  - name: increasing_rejection
    description: REJECTEDMATERIALFROM.count increasing
    edge: REJECTEDMATERIALFROM
    detection: "count90d > 2\xD7 historical average"
    severity: HIGH
  - name: community_drift
    description: Facility community assignment changed (louvaincommunityid shift)
    detection: "Current louvaincommunityid \u2260 previous period louvaincommunityid"
    severity: LOW
  churn_score_formula: "churn_risk = w1 \xD7 (1 - normalized_frequency) \n       \
    \    + w2 \xD7 (1 - recency_score)\n           + w3 \xD7 rejection_trend\n   \
    \        + w4 \xD7 community_drift_flag\nWHERE w1=0.35, w2=0.30, w3=0.25, w4=0.10\n"
  output:
    type: event
    destination: webhook
    payload:
      entity_type: string
      entity_id: string
      churn_risk_score: float
      signals_triggered: list<string>
      recommended_action: string
      context: map<string, any>
  job:
    name: churn_detection
    schedule: weekly Monday 06:00
    file: app/jobs/churn_detection.py
    query_file: app/graph/queries/churn_detection.cypher
    depends_on:
    - reinforcement_accepted
    - temporal_recency
  domain_pack_mapping:
    plasticos:
      entity: Facility
      action: "relationship manager alert \u2192 re-engagement outreach"
      description: Transaction history graph predicts facility churn
    mortgageos:
      entity: Borrower
      action: "champion tracking \u2192 job change detection \u2192 re-engagement\
        \ workflow"
      description: Champion monitoring predicts borrower churn
  files:
  - app/jobs/churn_detection.py
  - app/graph/queries/churn_detection.cypher
  - app/models/churn_event.py
  - app/webhooks/churn_webhook.py
  - tests/test_churn_detection.py
  name: churn_detection
syncstrategies:
- name: UNWINDMERGE
  description: "UNWIND batch \u2192 MERGE node \u2192 SET properties."
  use_case: Creating or fully updating nodes.
- name: UNWINDMATCHSET
  description: "UNWIND batch \u2192 MATCH existing node \u2192 SET properties."
  use_case: Partial updates (PATCH-style) without creating new nodes.
gdsjobs:
  algorithms:
  - name: louvain
    description: Community detection for entity clustering.
    write_property: louvain_community_id
  - name: cooccurrence
    description: Build CO_PURCHASED_WITH / COOCCURRED_WITH edges from transaction
      history.
    write_edge: true
  - name: reinforcement
    description: Weight edges by outcome feedback (approved/rejected).
    write_edge_property: reinforcement_weight
  - name: temporal_recency
    description: Build RECENTLY_TRANSACTED_WITH edges with recency decay.
    write_edge: true
  - name: equipment_sync
    description: "Materialize boolean flags as edges (e.g., has_wash_line \u2192 HAS_EQUIPMENT)."
    write_edge: true
  patch001_nightly_jobs:
  - name: reinforcement_polymer_history
    file: app/graph/queries/reinforcement_polymer_history.cypher
    job_module: app/jobs/reinforcement_polymer_history.py
    schedule: nightly 03:45
    algorithm: custom_aggregation
    writes_edges:
    - PROCESSEDPOLYMER
    depends_on:
    - reinforcement_accepted
    added_in: PATCH-001
  patch001_weekly_jobs:
  - name: community_membership
    file: app/graph/queries/community_membership.cypher
    job_module: app/jobs/community_membership.py
    schedule: weekly Sunday 02:30
    algorithm: louvain_to_topology
    writes_edges:
    - COMMUNITYMEMBER
    writes_nodes:
    - Community
    depends_on:
    - louvain
    added_in: PATCH-001
    note: Runs AFTER existing Louvain. Reads louvaincommunityid, writes COMMUNITYMEMBER
      edges.
  - name: form_cooccurrence
    file: app/graph/queries/cooccurrence_form.cypher
    job_module: app/jobs/form_similarity.py
    schedule: weekly Sunday 04:15
    algorithm: nodeSimilarity
    writes_edges:
    - COPROCESSEDWITH
    depends_on:
    - polymer_cooccurrence
    added_in: PATCH-001
  - name: capability_similarity
    file: app/graph/queries/capability_similarity.cypher
    job_module: app/jobs/capability_similarity.py
    schedule: weekly Sunday 04:30
    algorithm: nodeSimilarity
    writes_edges:
    - CAPABILITYSIMILAR
    depends_on:
    - equipment_sync
    - form_cooccurrence
    added_in: PATCH-001
  - name: competitive_overlap
    file: app/graph/queries/competitive_overlap.cypher
    job_module: app/jobs/competitive_overlap.py
    schedule: weekly Sunday 05:00
    algorithm: custom_aggregation
    writes_edges:
    - COMPETESWITH
    depends_on:
    - capability_similarity
    - geo_proximity
    added_in: PATCH-001
  - name: market_supply_aggregation
    file: app/graph/queries/reinforcement_market_supply.cypher
    job_module: app/jobs/reinforcement_market_supply.py
    schedule: weekly Sunday 04:00
    algorithm: custom_aggregation
    writes_edges:
    - SUPPLIEDTOMARKET
    depends_on: []
    added_in: PATCH-001
  - name: churn_detection
    file: app/graph/queries/churn_detection.cypher
    job_module: app/jobs/churn_detection.py
    schedule: weekly Monday 06:00
    algorithm: custom_aggregation
    writes_events: churn_webhook
    depends_on:
    - reinforcement_accepted
    - temporal_recency
    added_in: PATCH-001
kge:
  model: CompoundE3D
  embeddingdim: 256
  trainingrelations:
    description: Edges used for KGE training; can include rejection edges as hard
      negatives.
  beamsearch:
    beamwidth: 10
    maxdepth: 3
  ensemble:
    strategies:
    - weightedaverage
    - rankaggregation
    - mixtureofexperts
  vectorindex:
    name: '{domain}_kge_embeddings'
    dimension: 256
    similarityfunction: cosine
  training_relation_types_patch001:
    description: New edges added to CompoundE3D training set by PATCH-001
    added_types:
    - PROCESSEDPOLYMER
    - CAPABILITYSIMILAR
    - COMMUNITYMEMBER
    - COMPETESWITH
    - SUPPLIEDTOMARKET
    - CERTIFIEDFOR
    - COPROCESSEDWITH
    negative_sampling_enhancements:
    - source: COMPETESWITH
      strategy: Competing facility pairs that have NOT transacted = hard negatives
    - source: REJECTEDMATERIALFROM
      strategy: "Existing from v0.4.0 \u2014 retained"
    expected_improvements:
      facility_embedding_quality: +15-20% from behavioral (PROCESSEDPOLYMER) + competitive
        (COMPETESWITH) signals
      polymer_embedding_quality: +10-15% from COPROCESSEDWITH + existing COACCEPTEDWITH
      community_embedding: "NEW capability \u2014 Community-level embeddings from\
        \ COMMUNITYMEMBER"
      overall_mrr: +5-10% cumulative over v0.4.0 baseline
