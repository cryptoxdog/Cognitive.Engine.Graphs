        - MaterialForm
        relationship_types:
        - ACCEPTSFORM
        orientation: NATURAL
      config:
        similarityCutoff: 0.2
        topK: 5
      write_relationship_type: COPROCESSEDWITH
      write_property: jaccard_index
    embedding_impact: 'Creates form-form topology. Regrind and flake are often accepted
