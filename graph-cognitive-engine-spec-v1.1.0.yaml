revenue_model:
  pricing_tiers:
  - tier: starter
    queries_per_month: 10000
    price_usd: 299
  - tier: growth
    queries_per_month: 100000
    price_usd: 999
  - tier: enterprise
    queries_per_month: unlimited
    price_usd: custom
  monetization_paths:
  - SaaS subscription (per-tenant database)
  - API usage (per-match metering)
  - Domain pack marketplace (publish/sell custom domains)
  - Managed hosting + support
  - White-label licensing
  description: 'Formalized revenue generation mechanisms extracted from $510B production
    systems. Each mechanism maps to specific graph patterns, edges, and computation
    types. Domain packs instantiate with domain-specific metrics.

    '
  source: universal_graph_schema.json + full_brief_pattern_extraction.json
  mechanisms:
  - name: pipeline_generation
    aka: customer_acquisition
    graph_mechanism: Expand addressable entity space via graph discovery
    computation_types:
    - multihop_traversal
    - collaborative_filtering
    key_edges:
    - SIMILARTO
    - COOCCURREDWITH
    - CAPABILITYSIMILAR
    node_pattern: "QueryEntity \u2192 Multi-hop traversal \u2192 New CandidateEntity\
      \ (no direct history)"
    edge_pattern: SIMILARTO + COOCCURREDWITH enables discovery beyond 1-hop
    formula: "New customers = Graph expansion reach \xD7 Conversion rate"
    revenue_proof:
      google: Long-tail entity targeting captures niche advertisers
      amazon: "Product discovery via recommendations \u2192 new customer acquisition"
      meta: Lookalike audiences find new customers similar to best customers
    kpis:
    - name: addressable_candidate_expansion
      metric: '% increase in candidates reachable via multi-hop'
      target: 20-30%
    - name: discovery_conversion_rate
      metric: '% of multi-hop discovered candidates that convert'
      target: '>5%'
  - name: conversion_optimization
    graph_mechanism: Match quality improvement via historical success patterns
    computation_types:
    - collaborative_filtering
    - entity_resolution
    key_edges:
    - HISTORICALSUCCESS
    - CAPABILITYMATCH
    - PROCESSEDPOLYMER
    node_pattern: "QueryEntity \u2192 HISTORICALSUCCESS edges \u2192 High-confidence\
      \ CandidateEntity"
    edge_pattern: CAPABILITYMATCH + HISTORICALSUCCESS = precision
    formula: "Revenue = Volume \xD7 (Baseline conversion + Graph boost)"
    revenue_proof:
      google: "Semantic ad matching reduces wasted spend \u2192 8x advertiser ROI"
      amazon: 6x conversion rate with recommendations (12.29% vs 2.17%)
      meta: "Interest targeting + lookalikes \u2192 25.6% YoY growth"
    kpis:
    - name: match_success_rate
      metric: '% of matches resulting in positive outcome'
      target: 75-85% (up from 60% baseline)
    - name: time_to_match
      metric: Hours from query to successful match
      target: <28 hours (down from 48)
  - name: cross_sell_expansion
    graph_mechanism: Affinity detection via collaborative filtering
    computation_types:
    - collaborative_filtering
    - multihop_traversal
    key_edges:
    - COOCCURREDWITH
    - SUBSTITUTABLEFOR
    - COACCEPTEDWITH
    node_pattern: "CandidateEntity \u2192 COOCCURREDWITH \u2192 Related CandidateEntity"
    edge_pattern: Lift > 1.5 signals positive affinity for cross-sell
    formula: "Expansion revenue = Base purchase \xD7 (1 + Affinity-driven upsell %)"
    revenue_proof:
      google: Related entity suggestions expand advertiser targeting
      amazon: 20-40% AOV increase via bundle recommendations
      meta: "Interest expansion: user likes A \u2192 target A + B"
    kpis:
    - name: cross_sell_rate
      metric: '% of matches that generate additional transaction'
      target: '>15%'
    - name: wallet_share_expansion
      metric: '% increase in volume per customer'
      target: 20-30%
  - name: retention_loyalty
    graph_mechanism: Churn prediction via engagement graph patterns
    computation_types:
    - churn_detection
    key_edges:
    - RECENTLYTRANSACTEDWITH
    - ACCEPTEDMATERIALFROM
    - REJECTEDMATERIALFROM
    node_pattern: "CustomerEntity \u2192 Weakening ENGAGEMENT edges \u2192 Churn risk"
    edge_pattern: Declining edge strength + dormant nodes = churn signal
    formula: "Retained revenue = At-risk LTV \xD7 (1 - Churn rate after intervention)"
    revenue_proof:
      google: Entity-based bidding creates advertiser lock-in (switching cost)
      amazon: Re-purchase recommendations drive repeat behavior
      meta: "Engagement graph predicts churn \u2192 re-engagement campaigns"
    kpis:
    - name: churn_detection_rate
      metric: '% of actual churners detected before churn event'
      target: '>70%'
    - name: retention_after_intervention
      metric: '% of at-risk entities retained after re-engagement'
      target: '>50%'
  readme_revenue_template:
    description: 'Template for README_revenue.md that domain packs instantiate with
      domain-specific numbers.

      '
    file: docs/README_revenue.md
    sections:
    - Revenue Mechanisms (4 mechanisms with formulas)
    - KPI Targets (per mechanism)
    - "Graph Pattern \u2192 Revenue Attribution"
    - Projected Impact (domain-specific projections)
    - Measurement Plan (how to track each KPI)
mvp_roadmap:
  phase1:
    duration_days: 30
    deliverables:
    - Core engine (gates, scoring, traversal)
    - PlasticOS domain (reference implementation)
    - Sync endpoints (UNWIND MERGE)
    - Health check + basic monitoring
    greenlight: All unit tests pass, PlasticOS match query <200ms p95
  phase2:
    duration_days: 20
    deliverables:
    - GDS job scheduler (Louvain, cooccurrence)
    - KGE training + beam search
    - Bidirectional matching
    - MortgageOS domain
    greenlight: GDS jobs complete <5min, KGE beam search <500ms
  phase3:
    duration_days: 15
    deliverables:
    - Compliance (prohibited factors, audit, PII)
    - Plugin hooks (pre-match, post-match)
    - Healthcare + Freight domains
    - Multi-tenant isolation tests
    greenlight: Prohibited factor blocking at compile-time, audit logs captured
  phase4:
    duration_days: 10
    deliverables:
    - IaC (Terraform modules)
    - Production deployment
    - Grafana dashboards
    - Domain authoring docs
    greenlight: Deploy to staging, run 1M synthetic queries, p99 <1s
edge_registry:
  PROCESSEDPOLYMER:
    id: A3
    type: PROCESSEDPOLYMER
    from: Facility
    to: PolymerFamily
    direction: DIRECTED
    category: transaction
    managed_by: custom_aggregation
    added_in: PATCH-001
    layer: behavioral_history
    rebuild_job: reinforcement_polymer_history.cypher
    rebuild_cadence: nightly 03:00
    recency_decay:
      enabled: true
      function: exp(-age_days / 180.0)
      halflife_days: 125
    properties:
    - name: count
      type: int
      description: Total batches of this polymer processed
    - name: avg_yield_pct
      type: float
      description: Average output/input ratio
    - name: recency_score
      type: float
      description: exp(-age_days / 180)
    - name: last_event_date
      type: datetime
      description: Most recent processing event
    - name: aggregate_volume_lbs
      type: float
      description: Total lbs processed
    indexes:
    - CREATE INDEX processedpolymer_recency IF NOT EXISTS FOR ()-[r:PROCESSEDPOLYMER]-()
      ON (r.recency_score)
    embedding_impact: 'Behavioral edge DISTINCT from ACCEPTSPOLYMER (declared capability).
      A facility may ACCEPT a polymer but have never PROCESSED it. This edge captures
      actual experience, not claimed capability. Massively improves embedding quality
      for Facility nodes by grounding capability in transaction history.

      '
    scores:
      structural_clustering: 9
      link_prediction: 9
      reinforcement_signal: 9
      topological_richness: 8
      composite: 8.9
    redundancy_risk: "Low \u2014 ACCEPTSPOLYMER is declared capability; PROCESSEDPOLYMER\
      \ is behavioral history. Complementary, not redundant."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    prerequisites:
    - Transaction data with polymer_family field on each transaction
    - If not available, job runs as no-op
    files:
    - app/graph/queries/reinforcement_polymer_history.cypher
    - app/jobs/reinforcement_polymer_history.py
    - tests/test_processed_polymer.py
  CAPABILITYSIMILAR:
    id: C1
    type: CAPABILITYSIMILAR
    from: Facility
    to: Facility
    direction: UNDIRECTED
    category: precomputed
    managed_by: gds
    added_in: PATCH-001
    layer: capability_similarity
    rebuild_job: capability_similarity.cypher
    rebuild_cadence: weekly Sunday 04:30
    recency_decay:
      enabled: false
    properties:
    - name: similarity_score
      type: float
      description: NodeSimilarity score based on shared capability edges
    - name: overlap_vector
      type: string
      description: Serialized overlap dimensions (polymers, forms, equipment)
    indexes:
    - CREATE INDEX capabilitysimilar_score IF NOT EXISTS FOR ()-[r:CAPABILITYSIMILAR]-()
      ON (r.similarity_score)
    gds_config:
      algorithm: nodeSimilarity
      projection:
        node_labels:
        - Facility
        - PolymerFamily
        - MaterialForm
        - MaterialColor
        - ProcessType
        - Market
        relationship_types:
        - ACCEPTSPOLYMER
        - ACCEPTSFORM
        - ACCEPTSCOLOR
        - OPERATESPROCESS
        - LOCATEDINMARKET
        - HASEQUIPMENT
      config:
        similarityCutoff: 0.5
        topK: 15
      write_relationship_type: CAPABILITYSIMILAR
      write_property: similarity_score
    embedding_impact: "Connects facilities with overlapping capability profiles. Multi-edge\
      \ generalization of STRUCTURALLYCOMPATIBLE (which is MaterialProfile\u2192Facility).\
      \ CAPABILITYSIMILAR is Facility\u2192Facility based on ALL shared taxonomy edges.\
      \ Enables \"facilities like this one\" queries and competitive analysis.\n"
    scores:
      structural_clustering: 10
      link_prediction: 9
      reinforcement_signal: 5
      topological_richness: 9
      composite: 8.55
    redundancy_risk: "Low \u2014 STRUCTURALLYCOMPATIBLE is MaterialProfile\u2192Facility;\
      \ this is Facility\u2192Facility. Different semantic."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    edge_explosion_mitigation:
      topK: 15
      max_edges_per_facility: 15
      estimated_total: "n_facilities \xD7 15"
      note: "For 1,000 facilities \u2192 max 15,000 edges. Manageable."
    depends_on:
    - HASEQUIPMENT
    files:
    - app/graph/queries/capability_similarity.cypher
    - app/jobs/capability_similarity.py
    - tests/test_capability_similarity.py
  COMMUNITYMEMBER:
    id: C2
    type: COMMUNITYMEMBER
    from: Facility
    to: Community
    direction: DIRECTED
    category: precomputed
    managed_by: gds
    added_in: PATCH-001
    layer: community_topology
    rebuild_job: community_membership.cypher
    rebuild_cadence: weekly Sunday 02:30
    recency_decay:
      enabled: false
    properties:
    - name: membership_strength
      type: float
      description: Modularity contribution of this node to community
    - name: is_centroid
      type: bool
      description: Whether this facility is the community representative
    indexes:
    - CREATE INDEX communitymember_strength IF NOT EXISTS FOR ()-[r:COMMUNITYMEMBER]-()
      ON (r.membership_strength)
    embedding_impact: 'Currently Louvain writes communityId INTEGER PROPERTY on Facility
      nodes. This is invisible to topology algorithms. Materializing communities as
      first-class nodes with COMMUNITYMEMBER edges enables: 1) Community-level embeddings
      2) Cross-community bridge detection 3) Community-to-community trade flow analysis

      '
    scores:
      structural_clustering: 9
      link_prediction: 7
      reinforcement_signal: 5
      topological_richness: 9
      composite: 7.8
    redundancy_risk: "Low \u2014 replaces integer property with proper topology. louvaincommunityid\
      \ property coexists during transition."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    transition:
      coexistence: true
      louvaincommunityid_property: RETAINED
      migration_path: 'Phase 1: Write COMMUNITYMEMBER edges AND louvaincommunityid
        property. Phase 2: Scoring reads COMMUNITYMEMBER instead of property. Phase
        3: Remove louvaincommunityid property.

        '
    files:
    - app/graph/queries/community_membership.cypher
    - app/jobs/community_membership.py
    - tests/test_community_topology.py
  COMPETESWITH:
    id: C3
    type: COMPETESWITH
    from: Facility
    to: Facility
    direction: UNDIRECTED
    category: precomputed
    managed_by: custom_aggregation
    added_in: PATCH-001
    layer: competitive_intelligence
    rebuild_job: competitive_overlap.cypher
    rebuild_cadence: weekly Sunday 05:00
    recency_decay:
      enabled: false
    properties:
    - name: competition_score
      type: float
      description: "Jaccard overlap of accepted polymers \xD7 market overlap \xD7\
        \ distance proximity"
    - name: overlap_polymers
      type: int
      description: Number of shared polymer families
    - name: overlap_forms
      type: int
      description: Number of shared material forms
    - name: shared_market
      type: bool
      description: Whether both operate in same market
    indexes:
    - CREATE INDEX competeswith_score IF NOT EXISTS FOR ()-[r:COMPETESWITH]-() ON
      (r.competition_score)
    embedding_impact: 'Explicit competitive signal. Two facilities with high polymer
      overlap + same market + similar capacity = competitors. Enables: 1) Diversified
      buyer recommendations (avoid one competitor cluster) 2) Market concentration
      analysis 3) Competitive pricing intelligence

      '
    scores:
      structural_clustering: 8
      link_prediction: 7
      reinforcement_signal: 4
      topological_richness: 8
      composite: 6.85
    redundancy_risk: "Medium \u2014 overlaps with CAPABILITYSIMILAR but adds market\
      \ + distance dimensions."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    edge_explosion_mitigation:
      topK: 10
      competition_score_cutoff: 0.3
    depends_on:
    - CAPABILITYSIMILAR
    - COLOCATEDWITH
    files:
    - app/graph/queries/competitive_overlap.cypher
    - app/jobs/competitive_overlap.py
    - tests/test_competitive_overlap.py
  SUPPLIEDTOMARKET:
    id: A4
    type: SUPPLIEDTOMARKET
    from: Facility
    to: Market
    direction: DIRECTED
    category: transaction
    managed_by: custom_aggregation
    added_in: PATCH-001
    layer: trade_flow
    rebuild_job: reinforcement_market_supply.cypher
    rebuild_cadence: weekly Sunday 04:00
    recency_decay:
      enabled: true
      function: exp(-age_days / 365.0)
      halflife_days: 253
    properties:
    - name: count
      type: int
      description: Total shipments to facilities in this market
    - name: aggregate_volume_lbs
      type: float
      description: Total volume shipped to market
    - name: recency_score
      type: float
      description: exp(-age_days / 180)
    - name: last_event_date
      type: datetime
      description: Most recent supply event
    indexes:
    - CREATE INDEX suppliedtomarket_recency IF NOT EXISTS FOR ()-[r:SUPPLIEDTOMARKET]-()
      ON (r.recency_score)
    embedding_impact: "Creates supplier\u2192market paths currently missing. Today\
      \ only LOCATEDINMARKET exists (where facility IS). This captures where facility\
      \ SHIPS TO \u2014 different signal. Enables geographic trade flow analysis.\n"
    scores:
      structural_clustering: 7
      link_prediction: 8
      reinforcement_signal: 7
      topological_richness: 8
      composite: 7.75
    redundancy_risk: "Low \u2014 LOCATEDINMARKET is physical location; SUPPLIEDTOMARKET\
      \ is trade behavior."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    prerequisites:
    - Transaction data with buyer facility market derivable from buyer facility LOCATEDINMARKET
    files:
    - app/graph/queries/reinforcement_market_supply.cypher
    - app/jobs/reinforcement_market_supply.py
    - tests/test_supplied_to_market.py
  CERTIFIEDFOR:
    id: D4
    type: CERTIFIEDFOR
    from: Facility
    to: Certification
    direction: DIRECTED
    category: capability
    managed_by: sync
    added_in: PATCH-001
    layer: certification_topology
    properties:
    - name: certified_date
      type: datetime
      nullable: true
      description: When certification was obtained
    - name: expiry_date
      type: datetime
      nullable: true
      description: When certification expires
    - name: status
      type: string
      description: active | expired | pending
      default: active
    indexes:
    - CREATE INDEX certifiedfor_status IF NOT EXISTS FOR ()-[r:CERTIFIEDFOR]-() ON
      (r.status)
    sync_cypher: "MATCH (f:Facility)\nWITH f,\n  CASE WHEN f.foodgradecertified =\
      \ true THEN 'food_grade' END,\n  CASE WHEN f.medicalgradecapable = true THEN\
      \ 'medical_grade' END\n  AS cert_names\nUNWIND cert_names AS cn\nWITH f, cn\
      \ WHERE cn IS NOT NULL\nMATCH (c:Certification {name: cn})\nMERGE (f)-[r:CERTIFIEDFOR]->(c)\n\
      SET r.status = 'active'\n"
    embedding_impact: "Enables community detection on certified facility clusters.\
      \ Certification expiry tracking as temporal signal. Multi-certification similarity\
      \ (3 certs \u2260 1 cert structurally).\n"
    scores:
      structural_clustering: 7
      link_prediction: 6
      reinforcement_signal: 2
      topological_richness: 7
      composite: 6.05
    redundancy_risk: "Low \u2014 replaces boolean properties with proper topology."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    files:
    - app/graph/queries/sync_certification_edges.cypher
    - tests/test_certification_topology.py
  conditional_tier3:
    description: 'Tier 3 edges that require data availability prerequisites. Engine
      defines the schema; domain packs activate only when prerequisites are satisfied.
