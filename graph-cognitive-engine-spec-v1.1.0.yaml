      reinforcement_signal: 3
      topological_richness: 8
      composite: 6.45
    redundancy_risk: "None \u2014 no form-to-form edges exist."
    match_query_impact: NONE
    gate_impact: NONE
    scoring_impact: NONE
    kge_training: true
    files:
    - app/graph/queries/cooccurrence_form.cypher
    - app/jobs/form_similarity.py
    - tests/test_form_similarity.py
