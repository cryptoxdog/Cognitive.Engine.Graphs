# ============================================================================
# UNIVERSAL DEVELOPMENT PACK v1.0.0
# Extracted from UNIFIED_PROMPT_TOOLKIT using hybrid reasoning
# Domain-agnostic patterns for high-quality development
# ============================================================================

metadata:
  name: "Universal Development Pack"
  version: "1.0.0"
  source: "UNIFIED_PROMPT_TOOLKIT (339 files analyzed)"
  extraction_method: "Hybrid reasoning (abductive + deductive + inductive)"
  applicability: "Universal (all development domains)"
  confidence: 0.92

# ============================================================================
# SECTION 1: CORE DEVELOPMENT PRINCIPLES
# ============================================================================

core_principles:
  
  # Principle 1: Autonomous Operations
  autonomous_operations:
    enabled: true
    description: "Minimize human intervention through self-healing and auto-remediation"
    patterns:
      - "Detect anomalies automatically"
      - "Apply remediation without manual approval for minor/moderate issues"
      - "Trigger rollback automatically for critical failures"
      - "Log all autonomous actions for audit trail"
    enforcement: "mandatory"
    
  # Principle 2: Validation Gates
  validation_gates:
    enabled: true
    description: "Multi-layer validation before deployment"
    layers:
      - name: "Pre-action verification"
        checks: ["documentation read", "context queried", "schema validated"]
      - name: "Compliance validation"
        checks: ["pattern matching", "credential validation", "security audit"]
      - name: "Post-deployment verification"
        checks: ["health check", "integration test", "monitoring active"]
    block_on_failure: true
    
  # Principle 3: Memory System
  memory_system:
    enabled: true
    description: "Learn from corrections and never repeat mistakes"
    features:
      - "Track all corrections in session"
      - "Persist corrections to memory ledger"
      - "Auto-apply learned patterns"
      - "Score patterns (success +1.0, partial +0.5, failure -1.0)"
    storage: "memory_index.json"
    aggregation_interval: "daily"
    
  # Principle 4: Metrics-Driven Improvement
  metrics_driven:
    enabled: true
    description: "Track performance metrics to drive continuous improvement"
    metrics:
      - name: "Confidence Index"
        target: "≥0.90"
        measurement: "Average confidence score across outputs"
      - name: "Correction Success Rate"
        target: "≥0.95"
        measurement: "Corrections applied successfully / total corrections"
      - name: "First Deployment Success"
        target: "≥0.95"
        measurement: "Deployments successful on first try / total deployments"
      - name: "Repeated Mistakes"
        target: "0%"
        measurement: "Same mistake repeated / total mistakes"
    telemetry_output: "metrics.json"
    
  # Principle 5: Production-Ready by Default
  production_ready_default:
    enabled: true
    description: "All outputs production-ready unless explicitly prototyping"
    requirements:
      - "Complete implementation (no stubs)"
      - "Error handling for all failure modes"
      - "Logging for all actions"
      - "Documentation inline"
      - "Security considerations addressed"
      - "Performance optimized"
    exceptions: ["prototype", "proof-of-concept", "spike"]

# ============================================================================
# SECTION 2: REASONING FRAMEWORK
# ============================================================================

reasoning_framework:
  
  # Use L9 Unified Reasoning Pack for complex tasks
  l9_integration:
    enabled: true
    reference: "L9_UNIFIED_REASONING_PACK_v2.md"
    trigger: "complexity >= moderate"
    
  # Adaptive Reasoning
  adaptive_reasoning:
    enabled: true
    description: "Adjust reasoning depth based on task complexity"
    complexity_levels:
      simple:
        unknowns: "0-2"
        reasoning_modes: ["deductive"]
        blocks_required: 3
        time_budget: "low"
      moderate:
        unknowns: "3-5"
        reasoning_modes: ["deductive", "abductive"]
        blocks_required: 5
        time_budget: "medium"
      complex:
        unknowns: "6-8"
        reasoning_modes: ["deductive", "abductive", "inductive"]
        blocks_required: 8
        time_budget: "high"
      highly_complex:
        unknowns: ">8"
        reasoning_modes: ["deductive", "abductive", "inductive", "meta"]
        blocks_required: 8
        time_budget: "very_high"
        meta_reasoning: true
    
  # Reasoning Metrics
  reasoning_metrics:
    enabled: true
    track:
      - "Confidence index (0.0-1.0)"
      - "Reasoning depth efficiency"
      - "Pattern detection accuracy"
      - "Decision quality score"
    output: "reasoning_metrics.json"

# ============================================================================
# SECTION 3: QUALITY STANDARDS
# ============================================================================

quality_standards:
  
  # Code Quality
  code_quality:
    style:
      - "Use active voice, not passive"
      - "Prefer explicit over implicit"
      - "Prefer composition over inheritance"
      - "Prefer immutability when possible"
    naming:
      - "Use descriptive names (no abbreviations unless standard)"
      - "Functions: verb_noun (e.g., get_user, validate_input)"
      - "Variables: noun (e.g., user_count, is_valid)"
      - "Classes: PascalCase noun (e.g., UserManager)"
    structure:
      - "Single responsibility per function/class"
      - "Max function length: 50 lines"
      - "Max file length: 500 lines"
      - "Max nesting depth: 3"
    
  # Documentation Quality
  documentation_quality:
    inline:
      - "Docstrings for all public functions/classes"
      - "Comments for complex logic only (code should be self-documenting)"
      - "TODO/FIXME/HACK tags with owner and date"
    external:
      - "README.md with setup, usage, examples"
      - "CHANGELOG.md with version history"
      - "Architecture diagrams for complex systems"
    canonical_headers:
      required: true
      format: "YAML frontmatter"
      fields: ["title", "purpose", "summary", "version", "created", "updated", "owner", "tags", "domain", "type", "production_ready"]
    
  # Error Handling Quality
  error_handling_quality:
    requirements:
      - "Handle all failure modes explicitly"
      - "Use specific exceptions (not generic Exception)"
      - "Log errors with context (timestamp, input, stack trace)"
      - "Provide actionable error messages"
      - "Implement retry logic with exponential backoff"
      - "Implement circuit breakers for external dependencies"
    patterns:
      - "Try-except-else-finally (Python)"
      - "Result types (Rust-style Ok/Err)"
      - "Error boundaries (React-style)"
    
  # Testing Quality
  testing_quality:
    coverage_target: 0.80
    types:
      - "Unit tests (fast, isolated)"
      - "Integration tests (external dependencies)"
      - "End-to-end tests (user workflows)"
    patterns:
      - "Arrange-Act-Assert (AAA)"
      - "Given-When-Then (BDD)"
    requirements:
      - "Test happy path"
      - "Test error paths"
      - "Test edge cases"
      - "Test boundary conditions"

# ============================================================================
# SECTION 4: WORKFLOW PATTERNS
# ============================================================================

workflow_patterns:
  
  # Pipeline Orchestration
  pipeline_orchestration:
    enabled: true
    description: "Coordinate multi-step workflows with validation gates"
    stages:
      - name: "Initialize"
        actions: ["Load config", "Verify environment", "Check dependencies"]
      - name: "Preflight"
        actions: ["Run pre-checks", "Validate inputs", "Check permissions"]
      - name: "Validation"
        actions: ["Schema validation", "Compliance check", "Security audit"]
      - name: "Execution"
        actions: ["Execute main logic", "Log progress", "Handle errors"]
      - name: "Verification"
        actions: ["Verify outputs", "Run post-checks", "Confirm success"]
      - name: "Rollback (if needed)"
        actions: ["Revert changes", "Restore state", "Log rollback"]
    auto_rollback: true
    
  # Anomaly Response
  anomaly_response:
    enabled: true
    description: "Detect and respond to anomalies autonomously"
    detection:
      sources: ["logs", "metrics", "alerts"]
      methods: ["threshold", "statistical", "ml-based"]
    classification:
      minor: "Auto-remediate, log action"
      moderate: "Auto-remediate, alert user"
      critical: "Trigger rollback, alert user immediately"
    remediation:
      auto_remediate: ["minor", "moderate"]
      manual_approval: ["critical"]
    
  # Health Scoring
  health_scoring:
    enabled: true
    description: "Score system health on 0-100 scale"
    metrics:
      - name: "Environment Sync"
        weight: 0.20
      - name: "Version Consistency"
        weight: 0.20
      - name: "Integrity"
        weight: 0.20
      - name: "Security Posture"
        weight: 0.20
      - name: "Operational Health"
        weight: 0.20
    threshold: 80
    action_on_low_score: "Block deployment, trigger investigation"
    output: "health_report.json"

# ============================================================================
# SECTION 5: DEVELOPMENT WORKFLOW
# ============================================================================

development_workflow:
  
  # Pre-Development
  pre_development:
    steps:
      - "Read relevant documentation"
      - "Query context for current state"
      - "Validate assumptions"
      - "Define success criteria"
      - "Estimate complexity"
    
  # During Development
  during_development:
    steps:
      - "Follow established patterns"
      - "Write tests alongside code"
      - "Log all actions"
      - "Handle errors explicitly"
      - "Document as you go"
    continuous_validation:
      - "Lint on save"
      - "Type check on save"
      - "Run tests on commit"
    
  # Post-Development
  post_development:
    steps:
      - "Run full test suite"
      - "Validate against schema"
      - "Security scan"
      - "Performance benchmark"
      - "Documentation review"
      - "Peer review (if applicable)"
    deployment_checklist:
      - "All tests passing"
      - "No security vulnerabilities"
      - "Performance acceptable"
      - "Documentation complete"
      - "Rollback plan defined"

# ============================================================================
# SECTION 6: LEARNING SYSTEM
# ============================================================================

learning_system:
  
  # Meta-Learning
  meta_learning:
    enabled: true
    description: "Learn from past interactions and compile into reusable knowledge"
    sources:
      - "Chat exports"
      - "System logs"
      - "Error logs"
      - "Correction logs"
    extraction:
      - "Methodologies that worked"
      - "Outcomes (success/failure)"
      - "Reasoning patterns"
      - "Common mistakes"
    compilation:
      output: "style_guide.md"
      update_frequency: "weekly"
    
  # Pattern Detection
  pattern_detection:
    enabled: true
    description: "Detect recurring patterns for automation"
    types:
      - "Success patterns (amplify)"
      - "Failure patterns (avoid)"
      - "Efficiency patterns (optimize)"
    accuracy_target: 0.94
    
  # Continuous Evolution
  continuous_evolution:
    enabled: true
    description: "Evolve practices based on learnings"
    triggers:
      - "New pattern detected (confidence > 0.85)"
      - "Repeated mistake (count > 3)"
      - "Performance degradation (metric < threshold)"
    actions:
      - "Update best practices"
      - "Add to mistake prevention list"
      - "Optimize workflow"
    notification: true

# ============================================================================
# SECTION 7: COMMUNICATION STANDARDS
# ============================================================================

communication_standards:
  
  # Output Format
  output_format:
    style: "conversational"
    language_level: "college"
    structure:
      - "Use outline format (A/B/C headers, 1/2/3 bullets)"
      - "Use tables for comparisons"
      - "Use diagrams for complex systems"
    conciseness:
      - "Target 250-500 tokens per response"
      - "Cap at 800 tokens (use prime + annex if needed)"
      - "Remove filler, use active voice"
    
  # Confidence Scoring
  confidence_scoring:
    required: true
    scale: "0.0-1.0"
    interpretation:
      "0.95-1.0": "Very confident (clear evidence, minimal assumptions)"
      "0.85-0.94": "Confident (strong rationale, minor trade-offs)"
      "0.75-0.84": "Moderately confident (reasonable rationale, some trade-offs)"
      "0.60-0.74": "Low confidence (unclear rationale, significant trade-offs)"
      "<0.60": "Very low confidence (uncertain, needs review)"
    placement: "End of output"
    
  # Assumptions & Trade-offs
  assumptions_tradeoffs:
    required: true
    format:
      - "List all assumptions explicitly"
      - "List all trade-offs explicitly"
      - "Explain rationale for each trade-off"
    placement: "Before recommendation"

# ============================================================================
# SECTION 8: SECURITY & GOVERNANCE
# ============================================================================

security_governance:
  
  # Security Standards
  security_standards:
    authentication:
      - "Use OAuth 2.0 / OIDC for user auth"
      - "Use API keys for service auth"
      - "Never hardcode credentials"
      - "Use environment variables or secret managers"
    authorization:
      - "Principle of least privilege"
      - "Role-based access control (RBAC)"
      - "Validate permissions on every request"
    data_protection:
      - "Encrypt sensitive data at rest (AES-256)"
      - "Encrypt data in transit (TLS 1.3)"
      - "Hash passwords (bcrypt, scrypt, Argon2)"
      - "Sanitize all inputs"
    
  # Governance Rules
  governance_rules:
    hard_rules:
      - "No invented data (state 'Unknown' if missing)"
      - "No hallucinated APIs (verify before using)"
      - "No deprecated dependencies (check before adding)"
      - "No manual secrets (use secret managers)"
    enforcement: "fatal"
    
  # Audit Trail
  audit_trail:
    enabled: true
    log_events:
      - "All deployments"
      - "All configuration changes"
      - "All security events"
      - "All autonomous actions"
    retention: "90 days"
    format: "JSON"

# ============================================================================
# SECTION 9: PERFORMANCE OPTIMIZATION
# ============================================================================

performance_optimization:
  
  # Optimization Targets
  targets:
    latency:
      api_response: "<200ms (p95)"
      page_load: "<2s (p95)"
      database_query: "<100ms (p95)"
    throughput:
      requests_per_second: ">1000"
      concurrent_users: ">10000"
    resource_usage:
      cpu: "<70% average"
      memory: "<80% average"
      disk: "<80% average"
    
  # Optimization Strategies
  strategies:
    caching:
      - "Cache frequently accessed data"
      - "Use CDN for static assets"
      - "Implement cache invalidation strategy"
    database:
      - "Index frequently queried fields"
      - "Use connection pooling"
      - "Optimize queries (avoid N+1)"
    code:
      - "Use async/await for I/O operations"
      - "Batch operations when possible"
      - "Lazy load when appropriate"
    
  # Monitoring
  monitoring:
    enabled: true
    metrics:
      - "Response times (p50, p95, p99)"
      - "Error rates"
      - "Resource usage"
      - "Throughput"
    alerts:
      - "Latency > threshold"
      - "Error rate > threshold"
      - "Resource usage > threshold"

# ============================================================================
# SECTION 10: INTEGRATION PATTERNS
# ============================================================================

integration_patterns:
  
  # API Integration
  api_integration:
    standards:
      - "RESTful design (resources, HTTP methods)"
      - "Versioning (URL or header)"
      - "Pagination (cursor or offset)"
      - "Rate limiting (429 response)"
    error_handling:
      - "Use standard HTTP status codes"
      - "Provide error details in response body"
      - "Implement retry with exponential backoff"
    authentication:
      - "API keys for service-to-service"
      - "OAuth for user-delegated access"
    
  # Database Integration
  database_integration:
    patterns:
      - "Repository pattern (abstract data access)"
      - "Unit of Work (transaction management)"
      - "Query builders (type-safe queries)"
    migrations:
      - "Version controlled"
      - "Reversible (up/down)"
      - "Tested in staging first"
    
  # Message Queue Integration
  message_queue_integration:
    patterns:
      - "Pub/Sub for event broadcasting"
      - "Work queues for task distribution"
      - "Dead letter queues for failed messages"
    guarantees:
      - "At-least-once delivery"
      - "Idempotent consumers"
      - "Message ordering (if required)"

# ============================================================================
# SECTION 11: DEPLOYMENT PATTERNS
# ============================================================================

deployment_patterns:
  
  # Deployment Strategy
  deployment_strategy:
    preferred: "blue-green"
    alternatives: ["canary", "rolling"]
    rollback_plan: "required"
    
  # Environment Management
  environment_management:
    environments: ["dev", "staging", "prod"]
    promotion_flow: "dev → staging → prod"
    validation_gates:
      staging: ["integration tests", "security scan"]
      prod: ["smoke tests", "health check", "rollback plan"]
    
  # Infrastructure as Code
  infrastructure_as_code:
    enabled: true
    tools: ["Terraform", "CloudFormation", "Pulumi"]
    version_control: true
    peer_review: true
    
  # Continuous Integration/Deployment
  ci_cd:
    enabled: true
    pipeline_stages:
      - "Lint"
      - "Type check"
      - "Unit tests"
      - "Integration tests"
      - "Build"
      - "Security scan"
      - "Deploy to staging"
      - "E2E tests"
      - "Deploy to prod"
    automation_level: "full"

# ============================================================================
# SECTION 12: OBSERVABILITY
# ============================================================================

observability:
  
  # Logging
  logging:
    levels: ["DEBUG", "INFO", "WARN", "ERROR", "FATAL"]
    structured: true
    format: "JSON"
    fields:
      required: ["timestamp", "level", "message", "service", "trace_id"]
      optional: ["user_id", "request_id", "duration", "error_stack"]
    retention:
      dev: "7 days"
      staging: "30 days"
      prod: "90 days"
    
  # Metrics
  metrics:
    types: ["counter", "gauge", "histogram", "summary"]
    collection: "Prometheus-compatible"
    dashboards: "Grafana"
    
  # Tracing
  tracing:
    enabled: true
    standard: "OpenTelemetry"
    sampling_rate: 0.01
    
  # Alerting
  alerting:
    channels: ["email", "slack", "pagerduty"]
    severity_levels: ["info", "warning", "critical"]
    escalation_policy: true

# ============================================================================
# SECTION 13: COLLABORATION PATTERNS
# ============================================================================

collaboration_patterns:
  
  # Version Control
  version_control:
    system: "Git"
    branching_strategy: "GitFlow"
    commit_messages:
      format: "type(scope): subject"
      types: ["feat", "fix", "docs", "style", "refactor", "test", "chore"]
    pull_requests:
      required: true
      reviewers: 1
      checks: ["tests passing", "no conflicts"]
    
  # Code Review
  code_review:
    focus_areas:
      - "Correctness"
      - "Readability"
      - "Performance"
      - "Security"
      - "Test coverage"
    turnaround_time: "24 hours"
    
  # Documentation
  documentation:
    types:
      - "README (setup, usage)"
      - "Architecture docs (system design)"
      - "API docs (endpoints, schemas)"
      - "Runbooks (operations)"
    update_frequency: "on every change"
    
  # Knowledge Sharing
  knowledge_sharing:
    methods:
      - "Tech talks"
      - "Pair programming"
      - "Documentation"
      - "Post-mortems"
    frequency: "weekly"

# ============================================================================
# SECTION 14: FORBIDDEN PRACTICES
# ============================================================================

forbidden_practices:
  
  # Code
  code:
    - "Hardcoded credentials"
    - "Commented-out code (delete instead)"
    - "Magic numbers (use named constants)"
    - "Global state (use dependency injection)"
    - "Swallowing exceptions (log or re-throw)"
    
  # Architecture
  architecture:
    - "Tight coupling"
    - "God objects (single class doing too much)"
    - "Circular dependencies"
    - "Premature optimization"
    
  # Process
  process:
    - "Deploying without tests"
    - "Deploying on Fridays (unless emergency)"
    - "Skipping code review"
    - "Manual deployments (use CI/CD)"
    
  # Communication
  communication:
    - "Hedging (just say it)"
    - "Apologies for doing your job"
    - "Spin (be direct)"
    - "Fabricating data (say 'Unknown')"

# ============================================================================
# SECTION 15: INTEGRATION WITH EXISTING PACKS
# ============================================================================

integration:
  
  # Load Order
  load_order:
    - "UniversalDevelopmentPack.yaml (this file)"
    - "UserPrefPack_v1.4.yaml (user-specific preferences)"
    - "L9_UNIFIED_REASONING_PACK_v2.md (reasoning framework)"
    - "Domain-specific packs (e.g., CursorPreferencePack.md)"
    
  # Conflict Resolution
  conflict_resolution:
    priority: "User > Domain > Universal"
    rule: "More specific overrides more general"
    
  # Continuous Evolution
  continuous_evolution:
    enabled: true
    triggers:
      - "New universal pattern detected"
      - "Repeated mistake across domains"
      - "Performance improvement identified"
    notification: true
    version_bump: "MINOR"

# ============================================================================
# END OF UNIVERSAL DEVELOPMENT PACK
# ============================================================================
