# ============================================================================
# MODIFICATION LOCK
# ============================================================================

modification_lock:
  description: "Absolute constraints on what may and may not be modified"

  forbidden:
    - "Modify files not in locked TODO plan"
    - "Create files outside project scope"
    - "Alter docker-compose.yml without explicit TODO"
    - "Modify kernel_loader.py entry points without explicit TODO"
    - "Modify memory substrate connections without explicit TODO"
    - "Invent new abstractions or redesign unsolicited"
    - "Add logging/comments/refactoring outside TODO scope"
    - "Skip phases or assume partial completion"

  allowed:
    - "Implement exact changes in locked TODO plan"
    - "Operate within phases 0–6 as defined"
    - "Stop immediately if ambiguity detected"
    - "Report results in canonical format"

  violation_response: "If change requires violating MODIFICATION LOCK → It MUST fail at Phase 0"

# ============================================================================
# TIER CLASSIFICATION
# ============================================================================

tier_classification:
  KERNEL_TIER:
    description: "Kernels, executor, websocket orchestrator, memory substrate core"
    gmp_modules: ["GMP-System", "GMP-Action", "GMP-Audit Canonical"]
    examples:
      - "kernel_loader.py"
      - "executor.py"
      - "websocket_orchestrator.py"
      - "memory_substrate_service.py"

  RUNTIME_TIER:
    description: "Task queue, Redis client, rate limiter, tool registry, agents"
    gmp_modules: ["GMP-Action", "Integration-Tests"]
    examples:
      - "task_queue.py"
      - "redis_client.py"
      - "tool_registry.py"
      - "long_plan_graph.py"

  INFRA_TIER:
    description: "Docker-compose, infra, deploy, k8s, helm"
    gmp_modules:
      ["DEPLOYMENT_MANIFEST", "Wire-Orchestrators", "Critical-Path Tests"]
    examples:
      - "docker-compose.yml"
      - "infra/**"
      - "deploy/**"

  UX_TIER:
    description: "React/Next UI, TS client, docs, non-critical scripts"
    gmp_modules: ["Unit-Test-Quality", "Generator"]
    examples:
      - "frontend/**"
      - "docs/**"
      - "scripts/**"

# ============================================================================
# PROTECTED FILES
# ============================================================================

protected_files:
  description: "Files that require explicit approval before modification"

  critical:
    - path: "kernel_loader.py"
      reason: "Kernel YAML loading - breaks all agent identity"
    - path: "executor.py"
      reason: "Core agent execution loop - must preserve packet logging"
    - path: "websocket_orchestrator.py"
      reason: "Real-time connection management - async safety required"
    - path: "docker-compose.yml"
      reason: "Infrastructure wiring - requires full stack testing"
    - path: "memory_substrate_service.py"
      reason: "Packet ingestion and memory DAG - mission critical"

  modification_requirement: "Separate Phase 0 plan and dedicated GMP run required"

# ============================================================================
# FAIL RULES (GLOBAL)
# ============================================================================

fail_rules:
  global:
    - trigger: "Any checklist item cannot be marked with evidence"
      action: "STOP immediately"
      response: "Report exact gap + recovery options. User chooses next action."

    - trigger: "Ambiguity detected in TODO plan"
      action: "STOP immediately"
      response: "Request clarification before proceeding"

    - trigger: "Protected file in scope without approval"
      action: "FAIL at Phase 0"
      response: "User must provide explicit approval or revise scope"

    - trigger: "Implementation deviates from locked plan"
      action: "STOP immediately"
      response: "Revert changes. Report deviation. Re-run Phase 0 if needed."

# ============================================================================
# ENFORCEMENT SIGNATURE
# ============================================================================

enforcement:
  signature: |
    By executing under this contract, the agent agrees:
    ✓ TODO plans control scope (user locks changes before edits)
    ✓ Phases control execution (0–6 mandatory sequence)
    ✓ Evidence is mandatory (all checklist items require proof)
    ✓ Quality gates upfront (production-grade guaranteed)
    ✓ Ground truth per-query (re-verify files each response)
    ✓ Drift is impossible (Phase 5 + MODIFICATION LOCK prevent it)
    ✓ Failures are explicit (no silent partial success)

  user_obligations:
    - "Provide clear change requests"
    - "Supply necessary context files"
    - "Wait for locked TODO plan before approving edits"
    - "Trust FINAL DECLARATION when all phases complete"

