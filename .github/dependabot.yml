# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Universal CI/CD Pack — Dependabot Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# VERSION: 1.0.0
# PURPOSE: Automated dependency updates with logical grouping
# CUSTOMIZE: Update reviewers, assignees, and dependency groups for your stack
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: 2

updates:
  # ──────────────────────────────────────────────────────────────────────
  # Python Dependencies
  # ──────────────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    labels:
      - "dependencies"
      - "python"
      - "automerge-candidate"

    # CUSTOMIZE: Replace with your GitHub username(s)
    reviewers:
      - "YOUR_GITHUB_USERNAME"

    assignees:
      - "YOUR_GITHUB_USERNAME"

    # Dependency groups — customize for your stack
    groups:
      # Web frameworks
      web-framework:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "pydantic*"
          - "starlette*"
          - "django*"
          - "flask*"
          - "requests*"
          - "httpx*"

      # Database drivers and ORMs
      database:
        patterns:
          - "psycopg*"
          - "asyncpg*"
          - "sqlalchemy*"
          - "alembic*"
          - "pymongo*"
          - "redis*"

      # Testing frameworks
      testing:
        patterns:
          - "pytest*"
          - "coverage*"
          - "hypothesis*"
          - "faker*"

      # Development tools
      dev-tools:
        patterns:
          - "ruff*"
          - "mypy*"
          - "black*"
          - "isort*"
          - "pre-commit*"

      # Security and cryptography
      security:
        patterns:
          - "cryptography*"
          - "pyjwt*"
          - "passlib*"
          - "bcrypt*"

      # Monitoring and logging
      observability:
        patterns:
          - "structlog*"
          - "sentry-sdk*"
          - "prometheus*"
          - "opentelemetry*"

  # ──────────────────────────────────────────────────────────────────────
  # GitHub Actions
  # ──────────────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "chore(ci)"

    labels:
      - "dependencies"
      - "github-actions"
      - "automerge-candidate"

  # ──────────────────────────────────────────────────────────────────────
  # Docker
  # ──────────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

    open-pull-requests-limit: 3

    commit-message:
      prefix: "chore(docker)"

    labels:
      - "dependencies"
      - "docker"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# END OF DEPENDABOT CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
