name: L9 Audit Harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Run audit harness
        run: python tools/audit_harness.py --json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: l9-audit-reports
          path: artifacts/
