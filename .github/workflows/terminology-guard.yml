# DORA META: Terminology Consistency Guard
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CREATED: 2026-02-15T21:34:00-04:00
# AUTHOR: L9 Engineering (cryptoxdog)
# PURPOSE: Enforce consistent terminology across codebase (transportPacket, not PacketEnvelope)
# DEPENDENCIES: grep, Python check script
# DEPLOYMENT: Runs on all PRs
# DORA METRICS: Zero terminology drift | Review time saved >2hr/week
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Terminology Guard

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: terminology-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-terminology:
    name: Check Terminology Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check PacketEnvelope Prohibition
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "PacketEnvelope is DEPRECATED — Use transportPacket!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python tools/check_packet_envelope_prohibited.py --check .

      - name: Check Forbidden Terms
        run: |
          # Define forbidden terms (must use canonical versions)
          FORBIDDEN_TERMS=(
            "\\bSubstrate\\b(?!Service)"
            "\\blog\\.(?!bind)"
            "\\bprint\\("
            "\\bOptional\\["
            "\\bList\\["
            "\\bDict\\["
            "\\bTuple\\["
            "\\bSet\\["
          )

          VIOLATIONS=0

          for term in "${FORBIDDEN_TERMS[@]}"; do
            echo "Checking for: $term"

            if grep -rn -P "$term" \
              --include="*.py" \
              --exclude-dir=venv \
              --exclude-dir=.venv \
              --exclude-dir=__pycache__ \
              --exclude-dir=chassis \
              --exclude-dir=tools \
              --exclude-dir=performance \
              --exclude-dir=agents \
              --exclude-dir="current work" \
              engine/ tests/; then

              echo "❌ Found forbidden term: $term"
              VIOLATIONS=$((VIOLATIONS+1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ Terminology violations found: $VIOLATIONS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Use canonical terms:"
            echo "  • transportPacket (not PacketEnvelope — DEPRECATED)"
            echo "  • SubstrateService (not Substrate)"
            echo "  • structlog (not stdlib logging)"
            echo "  • T | None (not Optional[T])"
            echo "  • list[T] (not List[T])"
            echo ""
            exit 1
          fi

          echo "✅ No terminology violations found"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
