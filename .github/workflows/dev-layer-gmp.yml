# DORA META: Dev Layer GMP (Gate-Measure-Prove) Validation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CREATED: 2026-02-15T21:34:00-04:00
# AUTHOR: L9 Engineering (cryptoxdog)
# PURPOSE: Validate dev layer isolation and packet flow invariants
# DEPENDENCIES: pytest, dev_layer tests
# DEPLOYMENT: Runs on all PRs touching dev_layer/
# DORA METRICS: Gate pass rate >95% | Test coverage >80%
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Dev Layer GMP Validation

on:
  pull_request:
    paths:
      - 'dev_layer/**'
      - 'tests/dev_layer/**'
  workflow_dispatch:

concurrency:
  group: dev-layer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dev-layer-validation:
    name: Validate Dev Layer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.5 pytest-cov==6.0.0 pytest-asyncio

      - name: Run Dev Layer Tests
        run: |
          pytest tests/dev_layer/ \
            --cov=dev_layer \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ vars.COVERAGE_THRESHOLD || '70' }} \
            -v

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: dev-layer
          fail_ci_if_error: false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
