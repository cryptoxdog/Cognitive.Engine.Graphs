# CREATED: 2026-02-15T21:34:00-04:00
# AUTHOR: L9 Engineering (cryptoxdog)
# PURPOSE: HARD GATE for refactoring PRs — zero false positives allowed
# DEPENDENCIES: Ruff, Mypy, Pytest
# DEPLOYMENT: Runs on refactor/* branches only
# DORA METRICS: Zero regressions | Test coverage maintained
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Refactoring Safety Gate

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
  workflow_dispatch:

concurrency:
  group: refactor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refactor-gate:
    name: Refactoring Validation Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.15.5 mypy==1.14.0 pytest==8.3.5 pytest-xdist pytest-cov==6.0.0

      - name: Run Ruff Linter (BLOCKING)
        run: |
          ruff check . --output-format=github
# REMOVED: continue-on-error: true — this is a GATE

      - name: Run Ruff Formatter Check (BLOCKING)
        run: |
          ruff format --check .
# REMOVED: continue-on-error: true

      - name: Run Mypy Type Checker (BLOCKING)
        run: |
          mypy engine/ --show-error-codes --pretty --ignore-missing-imports --strict
# REMOVED: continue-on-error: true

      - name: Run Full Test Suite (BLOCKING)
        run: |
          pytest -n auto \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v
# REMOVED: continue-on-error: true

      - name: Refactoring Gate Passed
        run: |
          echo "✅ All refactoring safety checks passed"
          echo "🚀 Safe to merge"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
