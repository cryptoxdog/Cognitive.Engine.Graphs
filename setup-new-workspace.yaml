# ═══════════════════════════════════════════════════════════
#   SUITE 6 WORKSPACE SETUP - MINIMAL FOOTPRINT PROTOCOL
# ═══════════════════════════════════════════════════════════

protocol_name: "Suite 6 Workspace Setup"
protocol_version: "9.0.0"
enforcement_level: "200%"
total_duration_minutes: 15

# ═══════════════════════════════════════════════════════════
#   PHASE 1: PREFLIGHT CHECKS
# ═══════════════════════════════════════════════════════════

preflight:
  required_checks:
    - name: "Suite 6 Directory Exists"
      command: 'test -d "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)"'
      error_message: "Suite 6 not found in Dropbox"
      blocking: true

    - name: "Python 3 Installed"
      command: "python3 --version"
      expected: "Python 3.8+"
      blocking: true

    - name: "YAML Module Available"
      command: 'python3 -c "import yaml"'
      error_message: "Install with: python3 -m pip install pyyaml"
      blocking: true

    - name: "In Workspace Directory"
      command: "pwd"
      validation: "not_empty"
      blocking: true

# ═══════════════════════════════════════════════════════════
#   PHASE 2: MANDATORY STARTUP SEQUENCE
# ═══════════════════════════════════════════════════════════

startup_sequence:

  # ─────────────────────────────────────────────────────────
  # STEP 0: Session Startup Protocol (FIRST)
  # ─────────────────────────────────────────────────────────
  step_0:
    file: "profiles/session-startup-protocol.md"
    component_id: "PRF-SSP-001"
    purpose: "Session initialization checklist and governance activation"
    duration_seconds: 120
    skip: never
    enforcement: "200%"

  # ─────────────────────────────────────────────────────────
  # STEP 1: Core Governance Rules
  # ─────────────────────────────────────────────────────────
  step_1:
    files:
      - path: ".cursorrules"
        location: "workspace_root"
      - path: ".cursor-commands/templates/.cursorrules"
        location: "global_commands"
    purpose: "Core governance rules and standards"
    duration_seconds: 60
    skip: never
    enforcement:

  # ─────────────────────────────────────────────────────────
  # STEP 1.5: Reasoning Stack Activation
  # ─────────────────────────────────────────────────────────
  step_1_5:
    file: "startup/REASONING_STACK.yaml"
    component_id: "REASONING-STACK-001"
    purpose: "Activate all reasoning, learning, and quality systems"
    activation_response: "✅ Reasoning Stack ACTIVATED - All systems operational"
    duration_seconds: 30
    skip: never
    enforcement:
    capabilities:
      - "L9 Multi-Modal Reasoning"
      - "Recursive Learning (5 mechanisms)"
      - "Mistake Prevention (zero tolerance)"
      - "Pattern Detection (4 types)"
      - "Error Correction (3-phase)"
      - "10 Power Commands"

  # ─────────────────────────────────────────────────────────
  # STEP 2: Learning Files (12+ files, recursive)
  # ─────────────────────────────────────────────────────────
  step_2:
    path: ".cursor-commands/learning/"
    method: "recursive"
    purpose: "Load ALL learning files from GlobalCommands"
    expected_count: 12
    duration_seconds: 300
    skip: never
    enforcement:
    subdirectories:
      - failures/
      - patterns/
      - solutions/
  # ─────────────────────────────────────────────────────────
  # STEP 3: Suite 6 Config Check
  # ─────────────────────────────────────────────────────────
  step_3:
    file: ".suite6-config.json"
    purpose: "Verify governance enabled"
    duration_seconds: 5
    skip: "only_if_checked_in_last_10_minutes"
    enforcement: "100%"

  # ─────────────────────────────────────────────────────────
  # STEP 3.5: MCP Memory Health Check
  # ─────────────────────────────────────────────────────────
  step_3_5:
    name: "MCP Memory Health Check"
    command_portable: "python3 .cursor/memory/cursor_memory_client.py health"
    command_l9: "python3 agents/cursor/cursor_memory_client.py health"
    command_resolution: |
      Use command_portable (works in ANY repo with .cursor/memory/ synced).
      Use command_l9 only when inside the L9 repo itself.
      Agent should check: if .cursor/memory/cursor_memory_client.py exists, use it.
      Otherwise fall back to agents/cursor/cursor_memory_client.py.
    component_id: "MCP-HEALTH-001"
    purpose: "Verify C1 MCP memory server is reachable"
    duration_seconds: 15
    skip: never
    enforcement: "100%"
    blocking: false
    on_failure: "warn"
    reference_files:
      - ".cursor/memory/cursor_memory_kernel.yaml"
      - ".cursor/memory/cursor_system_prompt.md"
      - ".cursor/memory/governance-reference.md"
    troubleshooting:
      - "Check MCP_API_KEY_C in .env, .cursor/.env, or ~/.cursor-memory.env"
      - "Check MCP_URL is http://46.62.243.82/memory (direct IP, bypasses Cloudflare)"
      - "VPS may need restart: ssh root@46.62.243.82 'cd /opt/l9 && docker compose restart l9-api'"
    portability_note: |
      The portable memory client at .cursor/memory/cursor_memory_client.py has:
      - Zero external dependencies (structlog shimmed to stdlib logging)
      - Smart .env loader (searches cwd, .cursor/, upward, ~/.cursor-memory.env)
      - Full PacketEnvelope v2.0 compliance (same schema as L9)
      - All MCP tools: save_memory, search_memory, get_memory_stats
      Sync from L9: run .cursor/sync-portable.sh

  # ─────────────────────────────────────────────────────────
  # STEP 4-4.8: Startup Files (5 files)
  # ─────────────────────────────────────────────────────────
  step_4:
    file: "startup/system_capabilities.md"
    component_id: "DOC-CAP-001"
