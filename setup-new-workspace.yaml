    verification:
      - 'test -L .cursor-commands'
      - 'readlink .cursor-commands | grep -q "Dropbox/Cursor Governance/GlobalCommands"'

# ═══════════════════════════════════════════════════════════
#   PHASE 4: INTELLIGENCE SYSTEMS ACTIVATION
# ═══════════════════════════════════════════════════════════

intelligence_systems:
  learning_system:
    script: "ops/scripts/process_learnings.sh"
    purpose: "Extract patterns, mistakes, solutions from conversations"
    schedule: "hourly"
    components:
      - name: "Memory Aggregator"
        id: "OPS-AGG-001"
      - name: "Learning Updater"
        id: "OPS-UPD-001"
      - name: "Meta-Learning Sync"
        id: "OPS-MLS-001"
      - name: "Cursorrules Sync"
        id: "OPS-SYN-001"

  context_memory_system:
    script: "ops/scripts/process_context.sh"
    purpose: "Capture session state, decisions, project continuity"
    schedule: "hourly"
    component_id: "OPS-CTX-001"

  activation_commands:
    - name: "Activate Learning System"
      command: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_learnings.sh"'
      expected_steps: 4

    - name: "Activate Context-Memory System"
      command: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_context.sh"'
      expected_output: "Context saved"

# ═══════════════════════════════════════════════════════════
#   PHASE 5: PENDING LESSONS REVIEW
# ═══════════════════════════════════════════════════════════

pending_lessons_check:
  medium_quality:
    file: ".cursor-commands/learning/failures/lessons_review_log.jsonl"
    threshold: "0.70-0.85"
    action: "display_inline"
    display_command: |
      cat .cursor-commands/learning/failures/lessons_review_log.jsonl | python3 -c "
      import json, sys
      for i, line in enumerate(sys.stdin, 1):
          lesson = json.loads(line)
          print(f'\n{i}. {lesson[\"lesson_id\"]} (Score: {lesson[\"quality_score\"]})')
          print(f'   Mistake: {lesson[\"lesson_content\"].get(\"mistake\", \"N/A\")}')
          print(f'   Prevention: {lesson[\"lesson_content\"].get(\"prevention\", \"N/A\")}')
      "

  low_quality:
    file: ".cursor-commands/learning/failures/audit_log.jsonl"
    threshold: "<0.70"
    action: "display_summary"
    display_command: |
      cat .cursor-commands/learning/failures/audit_log.jsonl | python3 -c "
      import json, sys
      for i, line in enumerate(sys.stdin, 1):
          lesson = json.loads(line)
          print(f'\n{i}. {lesson[\"lesson_id\"]} (Score: {lesson[\"quality_score\"]})')
          print(f'   Reason: Too generic or insufficient detail')
      "

# ═══════════════════════════════════════════════════════════
#   PHASE 6: VERIFICATION
# ═══════════════════════════════════════════════════════════

verification:
  automated:
    script: "ops/scripts/verify-startup-files.sh"
    exit_on_fail: true
    expected_output: "ALL REQUIRED STARTUP FILES VERIFIED"

  manual_checks:
    file_counts:
      learning_files: 12
      reasoning_profiles: 3
      operating_modes: 3
      slash_commands: 6
      supporting_profiles: 2
      feature_files: 5
      foundation_engines: 2
      intelligence_advanced: 4
      intelligence_models: 3
      intelligence_templates: 1

    critical_paths:
      - path: ".suite6-config.json"
        must_contain: '"governance_enabled": true'
      - path: ".cursor-commands"
        must_be_symlink: true
        must_point_to: "Dropbox/Cursor Governance/GlobalCommands"

    launchagents:
      - name: "com.tenx.chat-export"
        status: "0"
      - name: "com.tenx.learning-processor"
        status: "0"
      - name: "com.cursor.context.processor"
        status: "0"

# ═══════════════════════════════════════════════════════════
#   PHASE 7: FINAL ALIGNMENT VERIFICATION
# ═══════════════════════════════════════════════════════════

final_verification:
  script: "ops/scripts/verify-setup-alignment.sh"
  expected_tests: 7
  expected_status: "SETUP ALIGNMENT: PERFECT"
  components_verified:
    - "Learning files in organized structure (failures, patterns, solutions)"
    - "3 learning subdirectories (failures, patterns, solutions)"
    - "LaunchAgent services running (when configured)"
    - "All scripts have Suite 6 headers"

# ═══════════════════════════════════════════════════════════
#   ENFORCEMENT RULES (200% LEVEL)
# ═══════════════════════════════════════════════════════════

enforcement:
  level: "200%"

  mandatory_rules:
    - rule: "All files marked 'skip: never' MUST be read"
      penalty: "BLOCK_EXECUTION"
      severity: "CRITICAL"

    - rule: "Verification failures MUST stop setup immediately"
      penalty: "EXIT_WITH_ERROR"
      severity: "CRITICAL"

    - rule: "Missing files MUST be reported and escalated"
      penalty: "ESCALATE_TO_USER"
      severity: "HIGH"

    - rule: "Symlink MUST point to Dropbox, not Library"
      penalty: "BLOCK_EXECUTION"
      severity: "CRITICAL"

    - rule: "All mandatory startup files MUST be accessible"
      penalty: "BLOCK_EXECUTION"
      severity: "CRITICAL"

  pre_execution_checklist:
    - "✅ Preflight checks passed"
    - "✅ All mandatory startup files read"
    - "✅ Pending lessons reviewed"
    - "✅ Intelligence systems activated"
    - "✅ Verification passed"
    - "✅ LaunchAgents running"

  success_criteria:
    - metric: "setup_completion_time"
      target: "<15 minutes"
    - metric: "files_loaded"
      target: "mandatory files accessible"
    - metric: "verification_success"
      target: "100%"
    - metric: "enforcement_compliance"
      target: "200%"

# ═══════════════════════════════════════════════════════════
#   QUICK REFERENCE
# ═══════════════════════════════════════════════════════════

quick_reference:
  total_duration: "~15 minutes"

  file_breakdown:
    startup_files: 5
    learning_files: 12
    reasoning_profiles: 3
    operating_modes: 3
    slash_commands: 6
    supporting_profiles: 2
    feature_files: 5
    foundation_engines: 2
    intelligence_advanced: 4
    intelligence_models: 3
    intelligence_templates: 1

  critical_commands:
    setup: 'python3 "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/environment/env-manager.py" sync "$(pwd)"'
    symlink: 'bash "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/ops/scripts/setup_workspace_symlinks.sh"'
    verify: "bash .cursor-commands/ops/scripts/verify-startup-files.sh"
    activate_learning: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_learnings.sh"'
    activate_context: 'bash "$HOME/Dropbox/Cursor Governance/GlobalCommands/ops/scripts/process_context.sh"'

  troubleshooting:
    yaml_missing: "python3 -m pip install pyyaml"
    wrong_symlink: 'rm .cursor-commands && ln -s "$HOME/Dropbox/Cursor Governance/GlobalCommands" .cursor-commands'
    verify_symlink: 'readlink .cursor-commands'

# ═══════════════════════════════════════════════════════════
#   AUTOMATION SUPPORT
# ═══════════════════════════════════════════════════════════

automation:
  parseable: true
  scriptable: true

  example_parser:
    language: "python"
    code: |
      import yaml
      with open('setup-new-workspace.yaml') as f:
          config = yaml.safe_load(f)

      # Iterate through startup sequence
      for step_name, step_config in config['startup_sequence'].items():
