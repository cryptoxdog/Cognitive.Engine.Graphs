    name: "Sync Suite 6 Configuration"
    command: 'python3 "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/environment/env-manager.py" sync "$(pwd)"'
    expected_output: ".suite6-config.json created"
    blocking: true

  step_2:
    name: "Create Symlinks"
    command: 'bash "$HOME/Dropbox/Cursor Governance/Cursor Governance Suite 6 (L9)/ops/scripts/setup_workspace_symlinks.sh"'
    expected_output: "Symlink created"
