        exists (where facility IS). This captures where facility SHIPS TO — different
        signal. Enables geographic trade flow analysis.
      scores:
        structural_clustering: 7
        link_prediction: 8
        reinforcement_signal: 7
        topological_richness: 8
        composite: 7.75
      redundancy_risk: "Low — LOCATEDINMARKET is physical location; SUPPLIEDTOMARKET is trade behavior."
      match_query_impact: NONE
      gate_impact: NONE
      scoring_impact: NONE
      kge_training: true
      prerequisites:
        - "Transaction data with buyer facility market derivable from buyer facility LOCATEDINMARKET"
