# ==============================================================================
# GAP 1: PATTERN 4 — Real-Time Context-Aware Re-Ranking
# SOURCE: top5_leverage_patterns_detailed.json → 4_REALTIME_CONTEXTAWARE_RANKING
# SOURCE: cognitive-engine-revenue-patterns.md → Pattern 4 implementation
# STATUS IN v1.0: Named in hooks list but NO typed schema, NO algorithm, NO config
# ==============================================================================

add:
  section: computation_types
  path: computation_types.realtime_reranking
  content:
    realtime_reranking:
      description: >
        Post-match dynamic re-ranking using session/real-time context signals.
        Base graph relevance score + real-time context signals → dynamic re-ranking
        → higher conversion than static scoring. Proven at Google ($175B — query intent
        shifts in-session), Amazon ($200B — cart context → 20-40% AOV increase),
        Meta ($135B — scroll speed/hover time → 14% impression increase).
      leverage_score: 8
      revenue_proof:
        google: "Query intent shifts in real-time; search 'apple' after 'iphone' → Apple Inc. favored"
        amazon: "Cart context adjusts recommendations; added laptop → prioritize accessories; 20-40% AOV increase"
        meta: "Real-time behavior (scroll speed, hover, video watch) adjusts ad delivery; 14% impression increase"
      trigger: post_match
      activation: conditional
      activation_condition: "request.realtime_context IS NOT NULL"

      context_schema:
        name: RealTimeContext
        description: >
          Domain-portable real-time context payload. Domain packs map their
          specific fields into this universal schema.
        fields:
          - name: urgency
            type: string
            enum: [normal, high, urgent]
            default: normal
            description: "Caller-declared urgency level"
            weight_map:
              normal: 1.0
              high: 1.5
              urgent: 2.0
          - name: capacity_signals
            type: map<string, float>
            nullable: true
            description: >
              Candidate-level capacity overrides. Keys are candidate_entity IDs,
              values are 0.0–1.0 capacity utilization. Domain packs populate:
              PlasticOS → facility.currentCapacityPct,
              MortgageOS → lo.pipelineCapacityPct.
          - name: performance_signals
            type: map<string, float>
            nullable: true
            description: >
              Candidate-level recent performance. Keys are candidate_entity IDs,
              values are 0.0–1.0 recent success rate. Domain packs populate:
              PlasticOS → facility 7-day success count,
              MortgageOS → lender 30-day approval rate.
          - name: freshness_signals
            type: map<string, float>
            nullable: true
            description: >
              Time-sensitive data freshness. Keys are candidate_entity IDs,
              values are hours since last update. Domain packs populate:
              PlasticOS → facility last transaction age,
              MortgageOS → rate sheet freshness hours.
          - name: session_actions
            type: list<SessionAction>
            nullable: true
            description: >
              Ordered list of actions in current session for sequence-aware ranking.
              Enables session-context disambiguation (Google pattern).

      session_action_schema:
        name: SessionAction
        fields:
          - name: action_type
            type: string
            description: "Domain-defined action type (e.g., 'viewed_candidate', 'rejected_candidate', 'refined_query')"
          - name: entity_id
            type: string
            description: "ID of entity involved in action"
          - name: timestamp
            type: datetime
          - name: metadata
            type: map<string, any>
            nullable: true

      algorithm:
        name: context_reranking
        type: gradient_boosted_trees
        implementation: xgboost
        description: >
          Combines base graph score with real-time context features.
          Model trained on historical match outcomes with context features.
          Falls back to linear combination if model not yet trained.
        feature_vector:
          - name: base_graph_score
            source: scoring_assembly.final_score
            description: "Pre-computed score from gate-then-score pipeline"
          - name: urgency_multiplier
            source: context_schema.urgency.weight_map
          - name: capacity_score
            source: "1.0 - capacity_signals[candidate_id]"
            description: "Inverted: lower utilization → higher score"
          - name: performance_score
            source: "performance_signals[candidate_id]"
          - name: freshness_score
            source: "exp(-freshness_signals[candidate_id] / freshness_halflife_hours)"
            default_halflife_hours: 24
          - name: session_recency_bias
            source: "1.0 if candidate_id in last 3 session_actions else 0.0"
            description: "Boost candidates user recently interacted with"
        fallback_formula: >
          final_score = base_graph_score
            × urgency_multiplier
            × (1.0 + performance_score × 0.1)
            × (1.0 + (1.0 - capacity_utilization) × 0.2)
            × freshness_score
        fallback_description: >
          Linear combination used when XGBoost model is not yet trained.
          Multiplicative — each factor scales the base score.
        training:
          target: transaction_outcome_success
          features: feature_vector
          retrain_cadence: weekly
          min_training_samples: 500
          model_storage: app/models/reranking/
          model_file: reranking_model.xgb

      api_contract:
        request_extension:
          field: realtime_context
          type: RealTimeContext
          nullable: true
          added_to: POST /v1/match
          description: "Optional field added to match request schema"
        response_extension:
          field: reranked
          type: boolean
          description: "True if real-time re-ranking was applied"
          added_to: match response metadata

      domain_pack_mapping:
        description: >
          Domain packs override field mappings in their domain_spec.yaml
          under plugins.post_match_hooks.realtime_rerank.field_mapping
        plasticos_example:
          urgency: intake.urgency
          capacity_signals: "facility.currentCapacityPct from sync endpoint"
          performance_signals: "facility 7-day RECENTLYTRANSACTEDWITH success count"
          freshness_signals: "facility last RECENTLYTRANSACTEDWITH.lasttxndate age in hours"
        mortgageos_example:
          urgency: borrower.urgency
          capacity_signals: "lo.pipelineCapacityPct"
          performance_signals: "lender 30-day approval rate from LENDERPERFORMANCE"
          freshness_signals: "ratesheet.date age in hours"

      files:
        - app/scoring/reranking.py
        - app/models/realtime_context.py
        - app/models/reranking/reranking_model.xgb
        - tests/test_reranking.py

# ==============================================================================
# GAP 2: PATTERN 5 — Multi-Hop Transitive Traversal
# SOURCE: top5_leverage_patterns_detailed.json → 5_MULTIHOP_TRAVERSAL_FOR_ENRICHMENT
# SOURCE: cognitive-engine-revenue-patterns.md → Pattern 5 implementation
# STATUS IN v1.0: COMPLETELY MISSING — no traversal step, no scoring, no Cypher
# ==============================================================================

---
add:
  section: computation_types
  path: computation_types.multihop_traversal
  content:
    multihop_traversal:
      description: >
        Transitive relationship discovery via 2-3 hop graph traversal.
        Direct 1-hop relationships insufficient → multi-hop traversal discovers
        transitive/indirect relationships → expands addressable candidate space.
        Proven at Google ($175B — 2-hop semantic ad matching), Amazon ($200B — 2-3
        hop co-purchase discovery, 35% of revenue), Meta ($135B — social proof
        propagation, 3-5x engagement vs cold).
      leverage_score: 8
      revenue_proof:
        google: "Entity → Related Entity → Ad; 2-hop semantic matching captures indirect relevance"
        amazon: "Customer → Product A → Product B ← Other Customers; 2-3 hop co-purchase; 35% of revenue"
        meta: "User → Friend → Page; social proof propagation; 3-5x engagement vs cold ads"

      node_types:
        - name: source_entity
          role: query/customer starting point
        - name: intermediate_entity
          role: bridge node connecting source to target
        - name: target_candidate
          role: indirectly related entity discovered via traversal

      edge_types:
        - name: DIRECT_RELATIONSHIP
          description: "1-hop (customer → purchased product)"
        - name: TRANSITIVE_RELATIONSHIP
          description: "2-hop (customer → product A → product B)"
        - name: BRIDGE_RELATIONSHIP
          description: "Intermediate entity connects source to target"

      algorithm:
        name: path_score_aggregation
        type: multiplicative_decay
        description: >
          BFS/DFS with depth limit (2-3 hops) → accumulate path scores via
          multiplicative edge weights → rank candidates by path strength → return top-K.
        max_depth: 3
        min_path_strength: 0.1
        path_score_formula: >
          path_score = PRODUCT(
            coalesce(rel.strength, 0.8) × coalesce(rel.success_rate, 0.7)
            FOR rel IN relationships(path)
          )
        recency_adjustment: >
          age_adjusted_score = path_score × exp(-max_age_days / recency_halflife_days)
        default_recency_halflife_days: 180

      traversal_template:
        description: >
          Domain-agnostic Cypher template. Domain packs substitute node labels,
          edge types, and filter predicates via their domain_spec.yaml
          override file at domains/{domain}/queries/multihop_discovery.cypher
        cypher: |
          // Universal multi-hop transitive discovery template
          // Domain packs replace: $SOURCE_LABEL, $BRIDGE_EDGES, $TARGET_LABEL,
          //   $SIMILARITY_TYPE, $SUCCESS_TYPE, $CAPABILITY_TYPE, $FILTER
          MATCH path = (source:$SOURCE_LABEL {id: $source_id})
            -[sim:$SIMILARITY_TYPE]->(similar_source)
            -[success:$SUCCESS_TYPE {outcome: 'positive'}]->(bridge)
            -[cap:$CAPABILITY_TYPE]->(target:$TARGET_LABEL)
          WHERE NOT EXISTS((source)-[:TRANSACTED_WITH]->(target))
            AND $FILTER
          WITH target, path,
            reduce(score = 1.0, rel IN relationships(path) |
              score * coalesce(rel.strength, 0.8) * coalesce(rel.success_rate, 0.7)
            ) AS transitive_score,
            count(DISTINCT bridge) AS bridge_count
          RETURN target,
            transitive_score,
            bridge_count,
            [node IN nodes(path) | node.id] AS path_trace
          ORDER BY transitive_score DESC, bridge_count DESC
          LIMIT $max_results

      scoring_dimension:
        name: transitive_compatibility
        description: >
          New scoring dimension derived from multi-hop traversal.
          Captures indirect compatibility signals invisible to 1-hop matching.
        weight: configurable_per_domain
        default_weight: 0.10
        source: multihop_traversal.transitive_score
        integration: >
          Added as optional 5th scoring dimension in scoring_assembly.
          Domains enable via domain_spec.yaml scoring.dimensions.transitive_compatibility.
          When disabled, weight redistributed to existing 4 dimensions.

      api_contract:
        endpoint: "POST /v1/discover"
        description: >
          Dedicated discovery endpoint separate from /v1/match.
          Returns candidates reachable via multi-hop traversal that would NOT
          appear in standard 1-hop gate-then-score matching.
        request_schema:
          source_entity_id: string
          max_hops: int  # 2 or 3
          min_path_strength: float  # default 0.1
          max_results: int  # default 10
          include_path_trace: boolean  # default false
        response_schema:
          candidates:
            - candidate_id: string
              transitive_score: float
              bridge_count: int
              path_trace: list<string>  # only if include_path_trace=true
              discovery_type: string  # "transitive_2hop" | "transitive_3hop"

      domain_pack_mapping:
        plasticos:
          source: MaterialIntake
          similarity_type: SIMILAR_TO
          success_type: TRANSACTED_WITH
          capability_type: CANPROCESS
          target: Facility
          filter: "target.facilityRole IN ['processor', 'compounder']"
          description: >
            Supplier → Past Facility A → Material Type B → Facility C.
            Supplier hasn't worked with Facility C, but Facility A successfully
            processed Material Type B, and Facility C excels at Material Type B.
        mortgageos:
          source: BorrowerProfile
          similarity_type: SIMILAR_TO
          success_type: APPLICATION
          capability_type: LENDER_PERFORMANCE
          target: LoanProduct
          filter: "target.status = 'active'"
          description: >
            Borrower → Similar Borrower A → Closed Loan with Lender B →
            Lender B strong in Loan Category C → prioritize Lender B.

      files:
        - app/graph/queries/multihop_discovery.cypher
        - app/scoring/path_aggregation.py
        - app/api/v1/discover.py
        - tests/test_multihop_traversal.py

# ==============================================================================
# GAP 3: DROPPED TIER 1 EDGE — PROCESSEDPOLYMER (composite score: 8.9)
# SOURCE: edge_gap_expansion.json → A3
# STATUS IN v0.4.0/v1.0: DROPPED — second-highest-scored proposed edge
# WHY IT MATTERS: Behavioral vs declared capability. ACCEPTSPOLYMER = "I say I can."
#   PROCESSEDPOLYMER = "I actually did." Massively improves embedding quality.
# ==============================================================================

---
add:
  section: edge_registry
  path: edge_registry.PROCESSEDPOLYMER
  content:
    PROCESSEDPOLYMER:
      id: A3
      type: PROCESSEDPOLYMER
      from: Facility
      to: PolymerFamily
      direction: DIRECTED
      category: transaction
      managed_by: custom_aggregation
      added_in: PATCH-001
      layer: behavioral_history
      rebuild_job: reinforcement_polymer_history.cypher
      rebuild_cadence: nightly 03:00
      recency_decay:
        enabled: true
        function: "exp(-age_days / 180.0)"
        halflife_days: 125
      properties:
        - name: count
          type: int
          description: "Total batches of this polymer processed"
        - name: avg_yield_pct
          type: float
          description: "Average output/input ratio"
        - name: recency_score
          type: float
          description: "exp(-age_days / 180)"
        - name: last_event_date
          type: datetime
          description: "Most recent processing event"
        - name: aggregate_volume_lbs
          type: float
          description: "Total lbs processed"
      indexes:
        - "CREATE INDEX processedpolymer_recency IF NOT EXISTS FOR ()-[r:PROCESSEDPOLYMER]-() ON (r.recency_score)"
      embedding_impact: >
        Behavioral edge DISTINCT from ACCEPTSPOLYMER (declared capability).
        A facility may ACCEPT a polymer but have never PROCESSED it.
        This edge captures actual experience, not claimed capability.
        Massively improves embedding quality for Facility nodes by grounding
        capability in transaction history.
      scores:
        structural_clustering: 9
        link_prediction: 9
        reinforcement_signal: 9
        topological_richness: 8
        composite: 8.9
      redundancy_risk: "Low — ACCEPTSPOLYMER is declared capability; PROCESSEDPOLYMER is behavioral history. Complementary, not redundant."
      match_query_impact: NONE
      gate_impact: NONE
      scoring_impact: NONE
      kge_training: true
      prerequisites:
        - "Transaction data with polymer_family field on each transaction"
        - "If not available, job runs as no-op"
      files:
        - app/graph/queries/reinforcement_polymer_history.cypher
        - app/jobs/reinforcement_polymer_history.py
        - tests/test_processed_polymer.py

# ==============================================================================
# GAP 4: DROPPED TIER 1 EDGE — CAPABILITYSIMILAR (composite score: 8.55)
# SOURCE: edge_gap_expansion.json → C1
# STATUS IN v0.4.0/v1.0: DROPPED — multi-edge facility-to-facility similarity
# WHY IT MATTERS: STRUCTURALLYCOMPATIBLE is MaterialProfile→Facility (intake-specific).
#   CAPABILITYSIMILAR is Facility→Facility based on ALL shared taxonomy edges.
#   Enables "facilities like this one" queries and competitive analysis.
# ==============================================================================

---
add:
  section: edge_registry
  path: edge_registry.CAPABILITYSIMILAR
  content:
    CAPABILITYSIMILAR:
      id: C1
      type: CAPABILITYSIMILAR
      from: Facility
      to: Facility
      direction: UNDIRECTED
      category: precomputed
      managed_by: gds
      added_in: PATCH-001
      layer: capability_similarity
      rebuild_job: capability_similarity.cypher
      rebuild_cadence: weekly Sunday 04:30
      recency_decay:
        enabled: false
      properties:
        - name: similarity_score
          type: float
          description: "NodeSimilarity score based on shared capability edges"
        - name: overlap_vector
          type: string
          description: "Serialized overlap dimensions (polymers, forms, equipment)"
      indexes:
        - "CREATE INDEX capabilitysimilar_score IF NOT EXISTS FOR ()-[r:CAPABILITYSIMILAR]-() ON (r.similarity_score)"
      gds_config:
        algorithm: nodeSimilarity
        projection:
          node_labels: [Facility, PolymerFamily, MaterialForm, MaterialColor, ProcessType, Market]
          relationship_types: [ACCEPTSPOLYMER, ACCEPTSFORM, ACCEPTSCOLOR, OPERATESPROCESS, LOCATEDINMARKET, HASEQUIPMENT]
        config:
          similarityCutoff: 0.5
          topK: 15
        write_relationship_type: CAPABILITYSIMILAR
        write_property: similarity_score
      embedding_impact: >
        Connects facilities with overlapping capability profiles. Multi-edge
        generalization of STRUCTURALLYCOMPATIBLE (which is MaterialProfile→Facility).
        CAPABILITYSIMILAR is Facility→Facility based on ALL shared taxonomy edges.
        Enables "facilities like this one" queries and competitive analysis.
      scores:
        structural_clustering: 10
        link_prediction: 9
        reinforcement_signal: 5
        topological_richness: 9
        composite: 8.55
      redundancy_risk: "Low — STRUCTURALLYCOMPATIBLE is MaterialProfile→Facility; this is Facility→Facility. Different semantic."
      match_query_impact: NONE
      gate_impact: NONE
      scoring_impact: NONE
      kge_training: true
      edge_explosion_mitigation:
        topK: 15
        max_edges_per_facility: 15
        estimated_total: "n_facilities × 15"
        note: "For 1,000 facilities → max 15,000 edges. Manageable."
      depends_on: [HASEQUIPMENT]  # needs equipment edges for full projection
      files:
        - app/graph/queries/capability_similarity.cypher
        - app/jobs/capability_similarity.py
        - tests/test_capability_similarity.py

# ==============================================================================
# GAP 5: DROPPED TIER 2 EDGE — COMMUNITYMEMBER (composite score: 7.8)
# SOURCE: edge_gap_expansion.json → C2
# STATUS IN v0.4.0/v1.0: DROPPED — communities as integer properties, not topology
# WHY IT MATTERS: Reifies Louvain communities as first-class nodes. Enables
#   community-level embeddings, cross-community bridge detection, community-to-
#   community trade flow analysis. Transforms annotation → topology.
# ==============================================================================

---
add:
  section: node_labels
  path: node_labels.Community
  content:
    Community:
      label: Community
      description: >
        Reified Louvain community. Materializes louvaincommunityid integer property
        as first-class topology. louvaincommunityid property REMAINS on Facility
        during transition. Both coexist.
      managed_by: gds
      added_in: PATCH-001
      constraint: "CREATE CONSTRAINT community_id IF NOT EXISTS FOR (c:Community) REQUIRE c.community_id IS UNIQUE"
      properties:
        - name: community_id
          type: int
          required: true
        - name: member_count
          type: int
          description: "Number of facilities in this community"
        - name: centroid_facility_id
          type: int
          nullable: true
          description: "Facility with highest modularity contribution"
        - name: dominant_polymers
          type: list<string>
          nullable: true
          description: "Top 3 polymer families by member count"
        - name: dominant_market
          type: string
          nullable: true
          description: "Most common market in this community"

---
add:
  section: edge_registry
  path: edge_registry.COMMUNITYMEMBER
  content:
    COMMUNITYMEMBER:
      id: C2
      type: COMMUNITYMEMBER
      from: Facility
      to: Community
      direction: DIRECTED
      category: precomputed
      managed_by: gds
      added_in: PATCH-001
      layer: community_topology
      rebuild_job: community_membership.cypher
      rebuild_cadence: weekly Sunday 02:30
      recency_decay:
        enabled: false
      properties:
        - name: membership_strength
          type: float
          description: "Modularity contribution of this node to community"
        - name: is_centroid
          type: bool
          description: "Whether this facility is the community representative"
      indexes:
        - "CREATE INDEX communitymember_strength IF NOT EXISTS FOR ()-[r:COMMUNITYMEMBER]-() ON (r.membership_strength)"
      embedding_impact: >
        Currently Louvain writes communityId INTEGER PROPERTY on Facility nodes.
        This is invisible to topology algorithms. Materializing communities as
        first-class nodes with COMMUNITYMEMBER edges enables:
        1) Community-level embeddings
        2) Cross-community bridge detection
        3) Community-to-community trade flow analysis
      scores:
        structural_clustering: 9
        link_prediction: 7
        reinforcement_signal: 5
        topological_richness: 9
        composite: 7.8
      redundancy_risk: "Low — replaces integer property with proper topology. louvaincommunityid property coexists during transition."
      match_query_impact: NONE
      gate_impact: NONE
      scoring_impact: NONE
      kge_training: true
      transition:
        coexistence: true
        louvaincommunityid_property: RETAINED
        migration_path: >
          Phase 1: Write COMMUNITYMEMBER edges AND louvaincommunityid property.
          Phase 2: Scoring reads COMMUNITYMEMBER instead of property.
          Phase 3: Remove louvaincommunityid property.
      files:
        - app/graph/queries/community_membership.cypher
        - app/jobs/community_membership.py
        - tests/test_community_topology.py

