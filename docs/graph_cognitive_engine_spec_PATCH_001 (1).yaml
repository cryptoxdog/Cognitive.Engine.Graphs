---
add:
  section: edge_registry
  path: edge_registry.SUPPLIEDTOMARKET
  content:
    SUPPLIEDTOMARKET:
      id: A4
      type: SUPPLIEDTOMARKET
      from: Facility
      to: Market
      direction: DIRECTED
      category: transaction
      managed_by: custom_aggregation
      added_in: PATCH-001
      layer: trade_flow
      rebuild_job: reinforcement_market_supply.cypher
      rebuild_cadence: weekly Sunday 04:00
      recency_decay:
        enabled: true
        function: "exp(-age_days / 365.0)"
        halflife_days: 253
      properties:
        - name: count
