# ==============================================================================
# GAP 8: DROPPED TIER 2 EDGES — CERTIFIEDFOR + Certification node (score: 6.05)
# SOURCE: edge_gap_expansion.json → D4
# STATUS IN v0.4.0/v1.0: DROPPED — certification booleans trapped as properties
# ==============================================================================

---
add:
  section: node_labels
  path: node_labels.Certification
  content:
    Certification:
      label: Certification
      description: >
        Reified certification type. Replaces boolean properties (foodgradecertified,
        medicalgradecapable) with traversable edges to Certification nodes.
        Boolean properties REMAIN on Facility for gate compatibility.
      managed_by: static
      added_in: PATCH-001
      constraint: "CREATE CONSTRAINT certification_name IF NOT EXISTS FOR (c:Certification) REQUIRE c.name IS UNIQUE"
      properties:
        - name: name
          type: string
          required: true
          values: [food_grade, medical_grade, iso9001, iso14001, grs, src]
        - name: category
          type: string
          values: [safety, quality, environmental, sustainability]
      bootstrap_data:
        - { name: food_grade, category: safety }
        - { name: medical_grade, category: safety }
        - { name: iso9001, category: quality }
        - { name: iso14001, category: environmental }
        - { name: grs, category: sustainability }
        - { name: src, category: sustainability }

---
add:
  section: edge_registry
  path: edge_registry.CERTIFIEDFOR
  content:
    CERTIFIEDFOR:
      id: D4
      type: CERTIFIEDFOR
      from: Facility
      to: Certification
      direction: DIRECTED
      category: capability
      managed_by: sync
      added_in: PATCH-001
      layer: certification_topology
      properties:
        - name: certified_date
          type: datetime
          nullable: true
          description: "When certification was obtained"
        - name: expiry_date
          type: datetime
          nullable: true
          description: "When certification expires"
        - name: status
          type: string
          description: "active | expired | pending"
          default: active
      indexes:
        - "CREATE INDEX certifiedfor_status IF NOT EXISTS FOR ()-[r:CERTIFIEDFOR]-() ON (r.status)"
      sync_cypher: |
        MATCH (f:Facility)
        WITH f,
          CASE WHEN f.foodgradecertified = true THEN 'food_grade' END,
          CASE WHEN f.medicalgradecapable = true THEN 'medical_grade' END
          AS cert_names
        UNWIND cert_names AS cn
        WITH f, cn WHERE cn IS NOT NULL
        MATCH (c:Certification {name: cn})
        MERGE (f)-[r:CERTIFIEDFOR]->(c)
        SET r.status = 'active'
      embedding_impact: >
        Enables community detection on certified facility clusters.
        Certification expiry tracking as temporal signal. Multi-certification
        similarity (3 certs ≠ 1 cert structurally).
      scores:
        structural_clustering: 7
        link_prediction: 6
        reinforcement_signal: 2
        topological_richness: 7
        composite: 6.05
      redundancy_risk: "Low — replaces boolean properties with proper topology."
      match_query_impact: NONE
      gate_impact: NONE
      scoring_impact: NONE
      kge_training: true
      files:
        - app/graph/queries/sync_certification_edges.cypher
        - tests/test_certification_topology.py

# ==============================================================================
# GAP 9: RETENTION/CHURN PATTERN — completely missing from all specs
# SOURCE: universal_graph_schema.json → revenue_generation_mechanisms.retention_loyalty
# SOURCE: full_brief_pattern_extraction.json → top5[5] temporal_decay + churn
# SOURCE: top5_leverage_patterns_detailed.json → revenue mechanics
# STATUS IN v1.0: ZERO — no churn detection, no re-engagement, no retention logic
# ==============================================================================

---
add:
  section: computation_types
  path: computation_types.churn_detection
  content:
    churn_detection:
      description: >
        Churn prediction via engagement graph patterns. Weakening edge
        strengths and dormant nodes signal churn risk. Proven at Google
        (entity-based bidding lock-in), Amazon (re-purchase recommendations),
        Meta (engagement graph → re-engagement campaigns), Gong (deal risk
        detection via engagement graph), Gainsight (health score graph).
      leverage_score: 8
      revenue_proof:
        google: "Entity-based bidding creates advertiser lock-in (switching cost)"
        amazon: "Re-purchase recommendations drive repeat customer behavior"
        meta: "Engagement graph predicts churn → re-engagement campaigns"
        gong: "Deal risk detection via engagement graph → flag at-risk deals"
        gainsight: "Health score graph (usage + support + NPS + billing) → expansion/churn detection"
      revenue_formula: "Retained revenue = At-risk LTV × (1 - Churn rate after intervention)"

      signals:
        - name: declining_transaction_frequency
          description: "RECENTLYTRANSACTEDWITH.txncount90d declining over 3+ periods"
          edge: RECENTLYTRANSACTEDWITH
          detection: "txncount90d < 50% of 180-day rolling average"
          severity: HIGH
        - name: dormant_relationship
          description: "RECENTLYTRANSACTEDWITH edge pruned (recency_score < 0.1)"
          edge: RECENTLYTRANSACTEDWITH
          detection: "Edge absence — previously existed, now pruned"
          severity: CRITICAL
        - name: declining_success_rate
          description: "ACCEPTEDMATERIALFROM.successrate declining"
          edge: ACCEPTEDMATERIALFROM
          detection: "successrate dropped >20% from 180-day baseline"
          severity: MEDIUM
        - name: increasing_rejection
          description: "REJECTEDMATERIALFROM.count increasing"
          edge: REJECTEDMATERIALFROM
          detection: "count90d > 2× historical average"
          severity: HIGH
        - name: community_drift
          description: "Facility community assignment changed (louvaincommunityid shift)"
          detection: "Current louvaincommunityid ≠ previous period louvaincommunityid"
          severity: LOW

      churn_score_formula: >
        churn_risk = w1 × (1 - normalized_frequency) 
                   + w2 × (1 - recency_score)
                   + w3 × rejection_trend
                   + w4 × community_drift_flag
        WHERE w1=0.35, w2=0.30, w3=0.25, w4=0.10

      output:
        type: event
        destination: webhook
        payload:
          entity_type: string  # "Facility" | domain-specific
          entity_id: string
          churn_risk_score: float  # 0.0–1.0
          signals_triggered: list<string>
          recommended_action: string  # "re-engagement" | "review" | "alert_rm"
          context: map<string, any>

      job:
        name: churn_detection
        schedule: weekly Monday 06:00
        file: app/jobs/churn_detection.py
        query_file: app/graph/queries/churn_detection.cypher
        depends_on: [reinforcement_accepted, temporal_recency]

      domain_pack_mapping:
        plasticos:
          entity: Facility
          action: "relationship manager alert → re-engagement outreach"
          description: "Transaction history graph predicts facility churn"
        mortgageos:
          entity: Borrower
          action: "champion tracking → job change detection → re-engagement workflow"
          description: "Champion monitoring predicts borrower churn"

      files:
        - app/jobs/churn_detection.py
        - app/graph/queries/churn_detection.cypher
        - app/models/churn_event.py
        - app/webhooks/churn_webhook.py
        - tests/test_churn_detection.py

# ==============================================================================
# GAP 10: REVENUE MODEL FORMALIZATION
# SOURCE: universal_graph_schema.json → revenue_generation_mechanisms (all 4)
# SOURCE: full_brief_pattern_extraction.json → revenue mechanics
# STATUS IN v1.0: Revenue projections referenced but formulas never formalized.
#   Repo structure calls for README_revenue.md but file was never written.
# ==============================================================================

---
add:
  section: revenue_model
  path: revenue_model
  content:
    revenue_model:
      description: >
        Formalized revenue generation mechanisms extracted from $510B production
        systems. Each mechanism maps to specific graph patterns, edges, and
        computation types. Domain packs instantiate with domain-specific metrics.
      source: "universal_graph_schema.json + full_brief_pattern_extraction.json"

      mechanisms:
        - name: pipeline_generation
          aka: customer_acquisition
          graph_mechanism: "Expand addressable entity space via graph discovery"
          computation_types: [multihop_traversal, collaborative_filtering]
          key_edges: [SIMILARTO, COOCCURREDWITH, CAPABILITYSIMILAR]
          node_pattern: "QueryEntity → Multi-hop traversal → New CandidateEntity (no direct history)"
          edge_pattern: "SIMILARTO + COOCCURREDWITH enables discovery beyond 1-hop"
          formula: "New customers = Graph expansion reach × Conversion rate"
          revenue_proof:
            google: "Long-tail entity targeting captures niche advertisers"
            amazon: "Product discovery via recommendations → new customer acquisition"
            meta: "Lookalike audiences find new customers similar to best customers"
          kpis:
            - name: addressable_candidate_expansion
              metric: "% increase in candidates reachable via multi-hop"
              target: "20-30%"
            - name: discovery_conversion_rate
              metric: "% of multi-hop discovered candidates that convert"
              target: ">5%"

        - name: conversion_optimization
          graph_mechanism: "Match quality improvement via historical success patterns"
          computation_types: [collaborative_filtering, entity_resolution]
          key_edges: [HISTORICALSUCCESS, CAPABILITYMATCH, PROCESSEDPOLYMER]
          node_pattern: "QueryEntity → HISTORICALSUCCESS edges → High-confidence CandidateEntity"
          edge_pattern: "CAPABILITYMATCH + HISTORICALSUCCESS = precision"
          formula: "Revenue = Volume × (Baseline conversion + Graph boost)"
          revenue_proof:
            google: "Semantic ad matching reduces wasted spend → 8x advertiser ROI"
            amazon: "6x conversion rate with recommendations (12.29% vs 2.17%)"
            meta: "Interest targeting + lookalikes → 25.6% YoY growth"
          kpis:
            - name: match_success_rate
              metric: "% of matches resulting in positive outcome"
              target: "75-85% (up from 60% baseline)"
            - name: time_to_match
              metric: "Hours from query to successful match"
              target: "<28 hours (down from 48)"

        - name: cross_sell_expansion
          graph_mechanism: "Affinity detection via collaborative filtering"
          computation_types: [collaborative_filtering, multihop_traversal]
          key_edges: [COOCCURREDWITH, SUBSTITUTABLEFOR, COACCEPTEDWITH]
          node_pattern: "CandidateEntity → COOCCURREDWITH → Related CandidateEntity"
          edge_pattern: "Lift > 1.5 signals positive affinity for cross-sell"
          formula: "Expansion revenue = Base purchase × (1 + Affinity-driven upsell %)"
          revenue_proof:
            google: "Related entity suggestions expand advertiser targeting"
            amazon: "20-40% AOV increase via bundle recommendations"
            meta: "Interest expansion: user likes A → target A + B"
          kpis:
            - name: cross_sell_rate
              metric: "% of matches that generate additional transaction"
              target: ">15%"
            - name: wallet_share_expansion
              metric: "% increase in volume per customer"
              target: "20-30%"

        - name: retention_loyalty
          graph_mechanism: "Churn prediction via engagement graph patterns"
          computation_types: [churn_detection]
          key_edges: [RECENTLYTRANSACTEDWITH, ACCEPTEDMATERIALFROM, REJECTEDMATERIALFROM]
          node_pattern: "CustomerEntity → Weakening ENGAGEMENT edges → Churn risk"
          edge_pattern: "Declining edge strength + dormant nodes = churn signal"
          formula: "Retained revenue = At-risk LTV × (1 - Churn rate after intervention)"
          revenue_proof:
            google: "Entity-based bidding creates advertiser lock-in (switching cost)"
            amazon: "Re-purchase recommendations drive repeat behavior"
            meta: "Engagement graph predicts churn → re-engagement campaigns"
          kpis:
            - name: churn_detection_rate
              metric: "% of actual churners detected before churn event"
              target: ">70%"
            - name: retention_after_intervention
              metric: "% of at-risk entities retained after re-engagement"
              target: ">50%"

      readme_revenue_template:
        description: >
          Template for README_revenue.md that domain packs instantiate with
          domain-specific numbers.
        file: docs/README_revenue.md
        sections:
          - "Revenue Mechanisms (4 mechanisms with formulas)"
          - "KPI Targets (per mechanism)"
          - "Graph Pattern → Revenue Attribution"
          - "Projected Impact (domain-specific projections)"
          - "Measurement Plan (how to track each KPI)"

