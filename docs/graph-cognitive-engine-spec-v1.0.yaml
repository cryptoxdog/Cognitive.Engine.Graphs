specversion: 1.0.0
projectname: L9 Graph Cognitive Matching Engine
description: >
  Domain-agnostic graph-native cognitive engine for gate-then-score matching,
  bidirectional entity relationships, collaborative filtering, KGE-powered similarity,
  and multi-tenant SaaS deployment. Designed for vertical AI product foundries.

architecture:
  core:
    framework: FastAPI 0.109+
    language: Python 3.11+
    database: Neo4j 5.x Enterprise
    gds: Neo4j Graph Data Science 2.6+
    async: neo4j-driver asyncio
    scheduler: APScheduler 3.10+ (AsyncIOScheduler)
    testing: pytest + testcontainers-neo4j
    deployment: Docker + Kubernetes / ECS / Cloud Run
  patterns:
    tenancy: database-per-tenant (Neo4j multi-database)
    configloading: filesystem YAML domain packs
    gatecompilation: compile-time Cypher generation
    scoringassembly: runtime WITH clause construction
    kgeintegration: ensemble (Cypher + KGE embeddings)
    compliance: compile-time + runtime prohibited factor blocking
  interfaces:
    ingress: Single FastAPI app, universal /v1/match endpoint
    tenantresolution: X-Domain-Key header OR subdomain OR API key prefix
    sync: POST /v1/sync/{entity_type} (UNWIND MERGE/MATCH SET)
    outcomes: POST /v1/outcomes (reinforcement feedback loop)
    admin: POST /v1/admin/rebuild (GDS + KGE recompute)

invariants:
  - Every domain is a standalone Neo4j database (no cross-tenant queries).
  - All gate logic compiles to Cypher WHERE clauses (no post-filter in Python).
  - Scoring dimensions assemble into a single WITH clause (no iterative scoring).
  - KGE embeddings are domain-specific (trained per tenant, no shared embeddings).
  - Compliance checks block prohibited factors at compile-time (gate validation).
  - NULL semantics are deterministic per gate type (pass/fail/configurable).
  - Bidirectional matching inverts gates automatically (invertible: true).
  - GDS jobs are declarative (schedule, projection, write target in YAML).
  - Plugins extend behavior without modifying core engine code.
  - IaC is required (no manual infrastructure setup).

units:
  system: custom
  definitions:
    currency:
      display: USD
      storage: USD
      tostorage: 1.0
      fromstorage: 1.0
    percentage:
      display: percent
      storage: decimal
      tostorage: 0.01
      fromstorage: 100.0
    time:
      display: days
      storage: days
      tostorage: 1.0
      fromstorage: 1.0
    distance:
      display: miles
      storage: meters
      tostorage: 1609.34
      fromstorage: 0.000621371
    weight:
      display: pounds
      storage: kilograms
      tostorage: 0.453592
      fromstorage: 2.20462
    temperature:
      display: fahrenheit
      storage: celsius
      conversionformula:
        tostorage: "(value - 32.0) * 5.0 / 9.0"
        fromstorage: "value * 9.0 / 5.0 + 32.0"
    rate_per_distance:
      display: USD/mile
      storage: USD_per_meter
      components:
        numerator: currency
        denominator: distance
    concentration:
      display: ppm
      storage: ppm
      tostorage: 1.0
      fromstorage: 1.0
    viscosity:
      display: g_per_10min
      storage: g_per_10min
      tostorage: 1.0
      fromstorage: 1.0

gatetypes:
  - name: range
    description: "Candidate property falls within [min, max] from query."
    parameters: [candidateprop, queryparam_min, queryparam_max, nullbehavior]
    invertible: true
    cypher_template: "candidate.{candidateprop} >= {queryparam_min} AND candidate.{candidateprop} <= {queryparam_max}"
  - name: threshold
    description: "Candidate property meets minimum/maximum threshold."
    parameters: [candidateprop, queryparam, operator, nullbehavior]
    invertible: true
    cypher_template: "candidate.{candidateprop} {operator} {queryparam}"
  - name: boolean
    description: "Boolean flag match (true/false or presence)."
    parameters: [candidateprop, queryparam, nullbehavior]
    invertible: false
    cypher_template: "candidate.{candidateprop} = {queryparam}"
  - name: composite
    description: "Logical combination of multiple sub-gates (AND/OR)."
    parameters: [subgates, logic, nullbehavior]
    invertible: false
    cypher_template: "({subgate_1}) {logic} ({subgate_2}) ..."
  - name: enummap
    description: "Query enum value maps to candidate's allowed set."
    parameters: [candidateprop, queryparam, mapping, nullbehavior]
    invertible: false
    cypher_template: "{queryparam} IN candidate.{candidateprop}"
  - name: exclusion
    description: "Blocks matches based on exclusion edges (e.g., BLACKLISTED)."
    parameters: [edgetype, fromnode, tonode, nullbehavior]
    invertible: false
    cypher_template: "NOT EXISTS((query)-[:{edgetype}]->(candidate))"
  - name: selfrange
    description: "Candidate's own property range contains query value."
    parameters: [candidateprop_min, candidateprop_max, queryparam, nullbehavior]
    invertible: false
    cypher_template: "{queryparam} >= candidate.{candidateprop_min} AND {queryparam} <= candidate.{candidateprop_max}"
  - name: freshness
    description: "Candidate data must be fresher than threshold."
    parameters: [candidateprop, maxagedays, nullbehavior]
    invertible: false
    cypher_template: "duration.between(candidate.{candidateprop}, datetime()).days <= {maxagedays}"
  - name: temporalrange
    description: "Candidate's temporal window overlaps with query window."
    parameters: [candidateprop_start, candidateprop_end, queryparam_start, queryparam_end, nullbehavior]
    invertible: true
    cypher_template: "candidate.{candidateprop_start} <= {queryparam_end} AND candidate.{candidateprop_end} >= {queryparam_start}"
  - name: traversal
    description: "Gate checks condition on a traversed relationship or node."
    parameters: [pattern, condition, nullbehavior]
    invertible: false
    cypher_template: "EXISTS {{ MATCH {pattern} WHERE {condition} }}"

scoringcomputationtypes:
  - name: geodecay
    description: "Distance-based decay: 1 / (1 + d / k)"
    parameters: [candidateprop_lat, candidateprop_lon, queryparam_lat, queryparam_lon, decayconstant]
    formula: "1.0 / (1.0 + point.distance(point({latitude: candidate.lat, longitude: candidate.lon}), point({latitude: query.lat, longitude: query.lon})) / {decayconstant})"
  - name: lognormalized
    description: "Log-normalized count: ln(1 + x) / ln(1 + max)"
    parameters: [candidateprop, maxvalue]
    formula: "ln(1 + candidate.{candidateprop}) / ln(1 + {maxvalue})"
  - name: communitymatch
    description: "Multiplicative bias when entities share Louvain community."
    parameters: [candidateprop, queryprop, bias]
    formula: "CASE WHEN candidate.{candidateprop} = query.{queryprop} THEN {bias} ELSE 1.0 END"
  - name: inverselinear
    description: "Lower-is-better linear score (e.g., wait time, price)."
    parameters: [candidateprop, minvalue, maxvalue]
    formula: "1.0 - (candidate.{candidateprop} - {minvalue}) / ({maxvalue} - {minvalue})"
  - name: candidateproperty
    description: "Pass-through of candidate property (e.g., quality score)."
    parameters: [candidateprop]
    formula: "candidate.{candidateprop}"
  - name: weightedrate
    description: "Count+rate aggregation with recency weighting."
    parameters: [countalias, ratealias, countweight, rateweight]
    formula: "{countweight} * {countalias} + {rateweight} * {ratealias}"
  - name: pricealignment
    description: "Price scoring vs query/benchmark (lower/higher/closest is better)."
    parameters: [candidateprop, queryparam, direction]
    formula: "CASE WHEN '{direction}' = 'lower' THEN 1.0 / (1.0 + candidate.{candidateprop} / {queryparam}) ELSE ... END"
  - name: temporalproximity
    description: "Time-remaining / time-since event scoring."
    parameters: [candidateprop, queryparam, direction]
    formula: "CASE WHEN '{direction}' = 'remaining' THEN duration.between(datetime(), candidate.{candidateprop}).days / {queryparam} ELSE ... END"
  - name: customcypher
    description: "Escape hatch for arbitrary Cypher expressions."
    parameters: [expression]
    formula: "{expression}"

syncstrategies:
  - name: UNWINDMERGE
    description: "UNWIND batch → MERGE node → SET properties."
    use_case: "Creating or fully updating nodes."
  - name: UNWINDMATCHSET
    description: "UNWIND batch → MATCH existing node → SET properties."
    use_case: "Partial updates (PATCH-style) without creating new nodes."

gdsjobs:
  algorithms:
    - name: louvain
      description: "Community detection for entity clustering."
      write_property: louvain_community_id
    - name: cooccurrence
      description: "Build CO_PURCHASED_WITH / COOCCURRED_WITH edges from transaction history."
      write_edge: true
    - name: reinforcement
      description: "Weight edges by outcome feedback (approved/rejected)."
      write_edge_property: reinforcement_weight
    - name: temporal_recency
      description: "Build RECENTLY_TRANSACTED_WITH edges with recency decay."
      write_edge: true
    - name: equipment_sync
      description: "Materialize boolean flags as edges (e.g., has_wash_line → HAS_EQUIPMENT)."
      write_edge: true

kge:
  model: CompoundE3D
  embeddingdim: 256
  trainingrelations:
    description: "Edges used for KGE training; can include rejection edges as hard negatives."
  beamsearch:
    beamwidth: 10
    maxdepth: 3
  ensemble:
    strategies:
      - weightedaverage
      - rankaggregation
      - mixtureofexperts
  vectorindex:
    name: "{domain}_kge_embeddings"
    dimension: 256
    similarityfunction: cosine

compliance:
  prohibitedfactors:
    enabled: true
    enforcement: compiletime  # Blocks gate compilation if prohibited field used
    blockedfields:
      - race
      - ethnicity
      - religion
      - gender
      - age
      - disability
      - familial_status
      - national_origin
    auditonviolation: true
  audit:
    enabled: true
    logmatchrequests: true
    logmatchresults: true
    logsyncoperations: true
    logadminoperations: true
    retentiondays: 90
  pii:
    enabled: true
    handling: hash  # or encrypt, redact, tokenize
    encryptionkeysource: env  # or vault, kms
    fields: []
    candidatefields: []

plugins:
  prematchhooks:
    description: "Hooks that run before gate filtering (e.g., grade inference, capacity checks)."
    registry:
      - name: grade_inference
        domain: plasticos
        module: engine.plugins.prematch.grade_inference
      - name: capacity_check
        domain: healthcare-referral
        module: engine.plugins.prematch.capacity_check
  postmatchhooks:
    description: "Hooks that run after scoring (e.g., negotiation, contaminant routing)."
    registry:
      - name: bargaining_game
        domain: plasticos
        module: engine.plugins.postmatch.negotiation
      - name: contaminant_routing
        domain: plasticos
        module: engine.plugins.postmatch.contaminant_routing

endpoints:
  universal:
    - path: /v1/match
      method: POST
      description: "Universal matching endpoint; domain inferred from X-Domain-Key header."
    - path: /v1/sync/{entity_type}
      method: POST
      description: "Batch upsert entities into graph."
    - path: /v1/outcomes
      method: POST
      description: "Submit outcome feedback (approved/denied/closed)."
    - path: /v1/resolve/{entity_type}
      method: POST
      description: "Entity resolution / deduplication."
    - path: /v1/admin/rebuild
      method: POST
      description: "Trigger GDS + KGE rebuild for domain."
    - path: /v1/domains
      method: GET
      description: "List available domain packs."
    - path: /v1/health
      method: GET
      description: "Health check."

domainpackstructure:
  required_sections:
    - domain
    - ontology
    - matchentities
    - queryschema
    - traversal
    - gates
    - scoring
  optional_sections:
    - derivedparameters
    - softsignals
    - sync
    - gdsjobs
    - kge
    - compliance
    - plugins
  validation:
    - All gate references must point to declared ontology properties.
    - All scoring dimension sources must resolve to traversal aliases or candidate properties.
    - All sync endpoints must reference declared node/edge types.
    - All GDS jobs must reference valid node labels and edge types.
    - KGE training relations must exist in ontology edges.

examples:
  domains:
    - name: plasticos
      file: domains/plasticos/spec.yaml
      coverage:
        gates: 22
        scoringdimensions: 10
        softsignals: 8
        traversalsteps: 16
        syncendpoints: 11
        gdsjobs: 9
        edgetypes: 29
        taxonomynodes: 9
    - name: mortgage-brokerage
      file: domains/mortgage-brokerage/spec.yaml
      coverage:
        gates: 18
        scoringdimensions: 9
        derivedparameters: 5
        traversalsteps: 8
        syncendpoints: 7
        gdsjobs: 6
        edgetypes: 15
    - name: healthcare-referral
      file: domains/healthcare-referral/spec.yaml
      coverage:
        gates: 15
        scoringdimensions: 7
        traversalsteps: 5
        syncendpoints: 5
        gdsjobs: 4
    - name: freight-matching
      file: domains/freight-matching/spec.yaml
      coverage:
        gates: 21
        scoringdimensions: 8
        softsignals: 5
        traversalsteps: 5
        syncendpoints: 6
        gdsjobs: 6
        edgetypes: 18

testing:
  strategy: pytest + testcontainers-neo4j
  coverage:
    unit:
      - Gate compiler (all 10 gate types)
      - NULL semantics per gate type
      - Scoring assembler
      - Sync generator (UNWIND strategies)
      - Traversal assembler
      - Direction inversion logic
    integration:
      - Full match pipeline per domain (4 domains)
      - Multi-tenant isolation
      - GDS job execution
      - KGE training + beam search
      - Outcome feedback loop
  fixtures:
    - Deterministic seed data per domain
    - Reproducible test graphs with known results

deployment:
  iac:
    tool: Terraform
    modules:
      - neo4j (Enterprise, multi-database, GDS plugin)
      - api (FastAPI on ECS/Cloud Run/Kubernetes)
      - redis (scheduler state, session cache)
      - monitoring (OpenTelemetry, Grafana, Prometheus)
  local_dev:
    tool: docker-compose
    services:
      - neo4j:5.15-enterprise
      - fastapi
      - redis:7
      - grafana
  ci_cd:
    - GitHub Actions / GitLab CI
    - Unit tests on PR
    - Integration tests on merge to main
    - IaC plan on PR, apply on merge

revenue_model:
  pricing_tiers:
    - tier: starter
      queries_per_month: 10000
      price_usd: 299
    - tier: growth
      queries_per_month: 100000
      price_usd: 999
    - tier: enterprise
      queries_per_month: unlimited
      price_usd: custom
  monetization_paths:
    - SaaS subscription (per-tenant database)
    - API usage (per-match metering)
    - Domain pack marketplace (publish/sell custom domains)
    - Managed hosting + support
    - White-label licensing

mvp_roadmap:
  phase1:
    duration_days: 30
    deliverables:
      - Core engine (gates, scoring, traversal)
      - PlasticOS domain (reference implementation)
      - Sync endpoints (UNWIND MERGE)
      - Health check + basic monitoring
    greenlight: All unit tests pass, PlasticOS match query <200ms p95
  phase2:
    duration_days: 20
    deliverables:
      - GDS job scheduler (Louvain, cooccurrence)
      - KGE training + beam search
      - Bidirectional matching
      - MortgageOS domain
    greenlight: GDS jobs complete <5min, KGE beam search <500ms
  phase3:
    duration_days: 15
    deliverables:
      - Compliance (prohibited factors, audit, PII)
      - Plugin hooks (pre-match, post-match)
      - Healthcare + Freight domains
      - Multi-tenant isolation tests
    greenlight: Prohibited factor blocking at compile-time, audit logs captured
  phase4:
    duration_days: 10
    deliverables:
      - IaC (Terraform modules)
      - Production deployment
      - Grafana dashboards
      - Domain authoring docs
    greenlight: Deploy to staging, run 1M synthetic queries, p99 <1s
