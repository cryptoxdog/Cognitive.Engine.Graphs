# ---------------------------------------------------------------------------
# CODING STANDARDS
# ---------------------------------------------------------------------------
coding_standards:
  - "Never use Odoo ORM — this is standalone Python"
  - ".cypher files are source of truth for matching logic"
  - "NULL-safe gates (coalesce or skip)"
  - "UNWIND+MERGE for batch sync, never loops"
  - "Return per-dimension score breakdown, not just final score"
  - "Docker Compose: neo4j:5-enterprise with GDS plugin"
  - "All temporal edges include created_at datetime"
  - "Outcome feedback is non-blocking (fire-and-forget POST)"
  - "Decay half-lives configurable via PLASTICOS_DECAY_* env vars"
  - "Every .cypher file has a comment header (purpose, inputs, outputs)"
  - "Entity resolution returns confidence scores"
  - "Compliance constraints live IN Cypher WHERE clause, never in Python post-filter"
  - "Type hints everywhere, no Any in public interfaces"
  - "Async driver with connection pooling"
  - "Tests seed deterministic data in testcontainer"
