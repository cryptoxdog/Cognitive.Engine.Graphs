    modified: false
  community_cypher:
    modified: false
    louvain_community_id: unchanged
  structural_cypher:
    modified: false
    STRUCTURALLY_COMPATIBLE: unchanged
  reinforcement_cypher:
    modified: false
    SUCCESS_WITH: unchanged
  scoring_policy:
    modified: false
    same_4_dimensions: true
    same_weights: true
    same_formula: true
  existing_node_labels:
    modified: false
    properties_removed: false
    properties_renamed: false
    constraints_changed: false
  existing_edge_types:
    modified: false
    properties_removed: false
    properties_renamed: false
  post_v1_match_output:
    identical_before_and_after: true
    tolerance: 1e-6

