rules:
- id: no-datetime-utcnow
  pattern: datetime.utcnow()
  message: "datetime.utcnow() is deprecated in Python 3.12+. Use datetime.now(UTC)\
    \ instead.\n\nFix:\n  from datetime import UTC, datetime\n  timestamp = datetime.now(UTC)\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/scripts/**'
    - '**/venv/**'
    - '**/.venv/**'
- id: httpx-async-context-required
  patterns:
  - pattern: $CLIENT = httpx.AsyncClient(...)
  - pattern-not-inside: "async with httpx.AsyncClient(...) as $CLIENT:\n    ...\n"
  message: "httpx.AsyncClient() must use async context manager for proper cleanup.\n\
    \nBad:\n  client = httpx.AsyncClient()\n  await client.aclose()  # Easy to forget!\n\
    \nGood:\n  async with httpx.AsyncClient() as client:\n      ...  # Auto-closed\
    \ on exit\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
- id: singleton-requires-lock
  patterns:
  - pattern: "if $_INSTANCE is None:\n    $_INSTANCE = $FACTORY(...)\n"
  - pattern-not-inside: "with $_LOCK:\n    ...\n"
  message: "Singleton initialization must use a lock for thread safety.\n\nBad:\n\
    \  if _instance is None:\n      _instance = create_instance()\n\nGood:\n  if _instance\
    \ is None:\n      with _lock:\n          if _instance is None:  # Double-check\n\
    \              _instance = create_instance()\n"
  languages:
  - python
  severity: WARNING
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
- id: float-requires-try-except
  patterns:
  - pattern: float($VAR)
  - pattern-not-inside: "try:\n    ...\nexcept ...:\n    ...\n"
  message: "float() conversion should handle ValueError for invalid input.\n\nBad:\n\
    \  value = float(user_input)  # Crashes on \"abc\"\n\nGood:\n  try:\n      value\
    \ = float(user_input)\n  except (ValueError, TypeError):\n      value = default_value\n"
  languages:
  - python
  severity: WARNING
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
- id: no-eval
  patterns:
  - pattern: eval(...)
  - pattern-not: $OBJ.eval(...)
  message: "eval() is forbidden \u2014 security vulnerability.\n\nUse safe alternatives:\n\
    \  - json.loads() for JSON\n  - ast.literal_eval() for Python literals\n  - Custom\
    \ parser for DSL\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/scripts/**'
    - '**/venv/**'
- id: no-sql-fstring
  patterns:
  - pattern-either:
    - pattern: f"SELECT ... {$VAR} ..."
    - pattern: f"INSERT ... {$VAR} ..."
    - pattern: f"UPDATE ... {$VAR} ..."
    - pattern: f"DELETE ... {$VAR} ..."
  message: "SQL queries must use parameterized queries, not f-strings.\n\nBad:\n \
    \ query = f\"SELECT * FROM users WHERE id = '{user_id}'\"\n\nGood:\n  query =\
    \ \"SELECT * FROM users WHERE id = $1\"\n  await conn.fetch(query, user_id)\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
- id: no-pickle-loads
  pattern: pickle.loads(...)
  message: "pickle.loads() is forbidden \u2014 deserialization vulnerability.\n\n\
    Use safe alternatives:\n  - json.loads() for JSON data\n  - msgpack for binary\
    \ data\n  - Protocol Buffers for structured data\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
- id: no-structlog-getchild
  pattern: $LOGGER.getChild(...)
  message: "structlog doesn't support getChild(). Use bind() instead.\n\nBad:\n  self.logger\
    \ = logger.getChild(self.__class__.__name__)\n\nGood:\n  self.logger = logger.bind(component=self.__class__.__name__)\n"
  languages:
  - python
  severity: ERROR
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/tests/**'
    - '**/venv/**'
