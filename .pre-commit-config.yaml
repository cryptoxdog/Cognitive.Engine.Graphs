# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: graph
# layer: [governance]
# tags: [L9_TEMPLATE, precommit]
# owner: platform
# status: active
# --- /L9_META ---
# Pre-commit hooks — mechanical enforcement before commit
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  
  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: [pydantic, types-PyYAML]
  
  # Security: Block banned imports in engine/
  - repo: local
    hooks:
      - id: block-fastapi-in-engine
        name: Block FastAPI imports in engine/
        entry: bash -c 'if git diff --cached --name-only | grep "^engine/.*\.py$" | xargs grep -l "from fastapi import\|import fastapi" | grep -v "engine/handlers.py"; then echo "ERROR: FastAPI imports found in engine/ (only handlers.py allowed)"; exit 1; fi'
        language: system
        pass_filenames: false
  
  # Security: Check for Cypher injection patterns (uses rg on macOS; grep -P on Linux)
  - repo: local
    hooks:
      - id: check-cypher-interpolation
        name: Check Cypher label interpolation
        entry: bash -c 'files=$(git diff --cached --name-only | grep "\.py$"); [ -z "$files" ] && exit 0; if command -v rg >/dev/null 2>&1; then echo "$files" | xargs rg -P "f\".*MATCH.*\(.*:\{(?!sanitize_label)" 2>/dev/null | grep -v "test" | grep -q . && { echo "ERROR: Cypher label interpolation without sanitize_label()"; exit 1; }; elif grep -P --version >/dev/null 2>&1; then echo "$files" | xargs grep -P "f\".*MATCH.*\(.*:\{(?!sanitize_label)" 2>/dev/null | grep -v "test" | grep -q . && { echo "ERROR: Cypher label interpolation without sanitize_label()"; exit 1; }; fi'
        language: system
        pass_filenames: false

  # L9 contract enforcement (20 contracts)
  - repo: local
    hooks:
      - id: l9-contract-scan
        name: L9 Contract Violation Scanner
        entry: python tools/contract_scanner.py
        language: python
        types: [python]
        pass_filenames: true
      - id: l9-contract-files-exist
        name: L9 Contract Files Existence Check
        entry: python tools/verify_contracts.py
        language: python
        pass_filenames: false
        always_run: true
  
  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--safe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1000]
