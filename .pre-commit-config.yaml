# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: graph
# layer: [governance]
# tags: [L9_TEMPLATE, precommit]
# owner: platform
# status: active
# --- /L9_META ---
#
# Pre-commit hooks — mechanical enforcement before commit
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Secrets scanning (harvested concept from L9 Kernel — fresh config)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["protect", "--staged", "--config=.gitleaks.toml"]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --follow-imports=silent]
        additional_dependencies: [pydantic, pydantic-settings, types-PyYAML, neo4j, structlog]
        exclude: ^(tests/|tools/|domains/|current work/|harvest_staging/|docs/|engine/security/|engine/auth/|agents/cursor/)

  # Unit tests (fast subset for pre-commit)
  # Note: Some tests require mock updates; run full suite with `pytest tests/`
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: bash -c 'PYTHONPATH="${PYTHONPATH}:." python3 -m pytest tests/ -m "unit" --ignore=tests/unit/test_gates_all_types.py --ignore=tests/unit/test_scoring.py --ignore=tests/unit/test_config.py --ignore=tests/unit/test_arbitration.py --ignore=tests/unit/test_wave6_dormant_features.py --tb=short -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Security: Block banned imports in engine/
  - repo: local
    hooks:
      - id: block-fastapi-in-engine
        name: Block FastAPI imports in engine/
        entry: >
          bash -c 'if git diff --cached --name-only | grep "^engine/.*\.py$" |
          xargs grep -l "from fastapi import\|import fastapi" |
          grep -v "engine/handlers.py"; then
          echo "ERROR: FastAPI imports found in engine/ (only handlers.py allowed)";
          exit 1; fi'
        language: system
        pass_filenames: false

  # Security: Check for Cypher injection patterns
  - repo: local
    hooks:
      - id: check-cypher-interpolation
        name: Check Cypher label interpolation
        entry: >
          bash -c 'files=$(git diff --cached --name-only | grep "\.py$");
          [ -z "$files" ] && exit 0;
          if command -v rg >/dev/null 2>&1; then
          echo "$files" | xargs rg -l "f\".*MATCH.*\\(.*:\\{" 2>/dev/null |
          xargs grep -L "sanitize_label" 2>/dev/null | grep -v "test" | grep -q . &&
          { echo "ERROR: Cypher label interpolation without sanitize_label()"; exit 1; };
          fi; exit 0'
        language: system
        pass_filenames: false

  # L9 contract enforcement (20 contracts)
  - repo: local
    hooks:
      - id: l9-contract-scan
        name: L9 Contract Violation Scanner
        entry: python tools/contract_scanner.py
        language: python
        types: [python]
        pass_filenames: true
      - id: l9-contract-files-exist
        name: L9 Contract Files Existence Check
        entry: python tools/verify_contracts.py
        language: python
        pass_filenames: false
        always_run: true

  # Audit harness (architecture + spec coverage + contract wiring)
  - repo: local
    hooks:
      - id: l9-audit-harness
        name: L9 Audit Harness
        entry: python tools/audit_harness.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ── Deprecated API enforcement ──────────────────────────────────────────────
  # Step 1: auto-fix (runs first; exits 1 if it modified files so you must
  #   re-stage the fixed versions and retry the commit)
  # Step 2: check (runs after; fails hard if any DomainSpecLoader still present)
  # Manual fix: python tools/check_deprecated_imports.py --fix .
  - repo: local
    hooks:
      - id: fix-deprecated-imports
        name: "Auto-fix: DomainSpecLoader → DomainPackLoader"
        entry: python3 tools/check_deprecated_imports.py --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: check-deprecated-imports
        name: "Banned API: DomainSpecLoader is deprecated (use DomainPackLoader)"
        entry: python3 tools/check_deprecated_imports.py --check
        language: system
        types: [python]
        pass_filenames: true

  # PacketEnvelope prohibition — superseded by transportPacket
  - repo: local
    hooks:
      - id: packet-envelope-prohibited
        name: "Deprecated API: PacketEnvelope → transportPacket"
        entry: python3 tools/check_packet_envelope_prohibited.py
        language: system
        types: [python]
        pass_filenames: true

  # Terminology guard (canonical terms: transportPacket, list[T], T | None)
  - repo: local
    hooks:
      - id: terminology-guard
        name: Check Terminology Consistency
        entry: >
          bash -c '
          VIOLATIONS=0;
          for pattern in "\\bprint\\(" "\\bOptional\\[" "\\bList\\[" "\\bDict\\["; do
            if git diff --cached --name-only | grep "\.py$" | grep -E "^(engine|tests)/" |
               xargs grep -l -P "$pattern" 2>/dev/null | grep -v __pycache__ | grep -q .; then
              echo "❌ Found forbidden term: $pattern";
              VIOLATIONS=$((VIOLATIONS+1));
            fi;
          done;
          [ $VIOLATIONS -eq 0 ] || { echo "Use: transportPacket, list[T], T | None"; exit 1; };
          exit 0'
        language: system
        pass_filenames: false

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: >
          (?x)^(
            docs/PlasticOS.*\.yaml|
            domains/MASTER-SPEC.*\.yaml|
            setup-new-workspace\.yaml|
            telemetry/.*\.yml|
            tools/l9_template_manifest\.yaml|
            \.github/pr_review_config\.yaml|
            \.github/.*\.yml
          )$
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1000]
