# Prometheus scrape config for L9 Engine
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "l9-api"
    metrics_path: "/v1/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "api"

  - job_name: "neo4j"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["l9-neo4j:2004"]
        labels:
          service: "neo4j"
