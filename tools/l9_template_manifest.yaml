manifest_version: "3.0.0"
profile: "ceg_strict_cutover"
authorities:
  runtime: "Gate_SDK"
  routing: "Gate"
  transport: "TransportPacket"
deprecated_compatibility:
  packet_envelope:
    status: "deprecated"
    allowed_only_in:
      - "compatibility_shims"
      - "migration_docs"
      - "compatibility_tests"
      - "scanner_allowlists"
  chassis_first:
    status: "forbidden_as_primary_truth"
required_artifacts:
  - "tools/contract_scanner.py"
  - "tools/audit_engine.py"
  - "tools/contract_report.py"
  - "tools/spec_extract.py"
  - "tools/audit_harness.py"
  - "tools/l9_meta_injector.py"
  - "tools/l9_template_manifest.yaml"
  - "tools/validate_domain.py"
  - "tools/domain_extractor.py"
required_signals:
  - "Gate_SDK"
  - "Gate"
  - "TransportPacket"
forbidden_primary_signals:
  - "PacketEnvelope"
  - "inflate_ingress("
  - "deflate_egress("
  - "chassis.router"
strict_fail_closed: true
