domain:
  id: plasticos
  name: PlasticOS
  version: 1.0.0
ontology:
  nodes:
    - label: Buyer
      canonical: company
      properties:
        entity_id: string
        revenue: float
        margin: float
        risk: float
        capacity: float
    - label: Supplier
      canonical: company
      properties:
        entity_id: string
        revenue: float
        margin: float
        risk: float
        capacity: float
    - label: Contact
      canonical: person
      properties:
        entity_id: string
        email: string
  edges:
    - type: KNOWS
      source_node: Contact
      target_node: Buyer
      attributes: {}
traversal:
  steps:
    - alias: buyer
      node_label: Buyer
      relationship_type: KNOWS
      direction: both
scoring:
  dimensions:
    - name: revenue
      source: revenue
      weight: 0.40
      positive: true
    - name: margin
      source: margin
      weight: 0.30
      positive: true
    - name: risk
      source: risk
      weight: 0.20
      positive: true
    - name: capacity
      source: capacity
      weight: 0.10
      positive: true
sync:
  nodes:
    - label: Buyer
      required_fields:
        - entity_id
        - revenue
        - margin
        - risk
        - capacity
    - label: Supplier
      required_fields:
        - entity_id
        - revenue
        - margin
        - risk
        - capacity
compliance:
  required_fields:
    - entity_id
    - revenue
    - margin
    - risk
    - capacity
decision_policy:
  version: 1.0.0
  hard_constraints:
    - metric: compliance_pass
      operator: eq
      value: true
    - metric: risk
      operator: lte
      value: 0.70
  weights:
    revenue: 0.40
    margin: 0.30
    risk: 0.20
    capacity: 0.10
  thresholds:
    approve_threshold: 0.50
    reject_threshold: 0.20
    conflict_tolerance: 0.35
