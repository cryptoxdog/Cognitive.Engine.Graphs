# origin: domain-specific
# engine: graph
# layer: [config]
# tags: [domains, master-spec]
# owner: domain-team
# status: active
# --- /L9_META ---
# ALL_DOMAINS_CONSOLIDATED.yaml
#
# THIS FILE CONTAINS ALL 10 DOMAIN SPECIFICATIONS
# Extract each domain into: domains/{domain-id}/spec.yaml
#
# DOMAINS INCLUDED:
# 1. plasticos (recycled plastic matching)
# 2. mortgage-brokerage (loan matching, ECOA-compliant)
# 3. healthcare-referral (provider matching, HIPAA-compliant)
# 4. freight-matching (load-carrier matching)
# 5. roofing-company (contractor-project matching)
# 6. executive-assistant (task-expert matching)
# 7. research-agent (paper-dataset matching)
# 8. aios-god-agent (tool orchestration)
# 9. repo-as-agent (code-contributor matching)
# 10. legal-discovery (case-document matching)
#
# ============================================================================
# DOMAIN 1: PLASTICOS (Recycled Plastic Matching)
# ============================================================================
# NOTE: Use the previously generated 2116-line plasticos/spec.yaml (artifact 72)
# That file is the complete, stress-tested version with all features.
#
# Key Stats: 29 edge types, 22 gates, 10 scoring dimensions, 9 GDS jobs
