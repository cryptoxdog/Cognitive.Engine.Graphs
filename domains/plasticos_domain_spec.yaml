# --- L9_META ---
# l9_schema: 1
# origin: domain-specific
# engine: graph
# layer: [config]
# tags: [domains, plasticos]
# owner: domain-team
# status: active
# --- /L9_META ---
# =============================================================================
# PlasticOS Domain Spec — Recycled Plastics Brokerage Matching
# =============================================================================
# spec_version: 0.4.1
# generated: 2026-03-17
# note: Restructured to match DomainSpec Pydantic schema (lowercase fields)
# =============================================================================

# ---------------------------------------------------------------------------
# DOMAIN METADATA
# ---------------------------------------------------------------------------
domain:
  id: plasticos
  name: "PlasticOS — Material-to-Facility Buyer Matching"
  description: >
    Match inbound recycled plastic material intake profiles to optimal buyer
    facilities (processors, compounders, recyclers, brokers, MRFs) based on
    polymer compatibility, physical form, MFI range, density, contamination
    tolerance, moisture, equipment capability, certifications, lot size,
    geographic proximity, transaction history reinforcement, community
    clustering, and temporal recency.
  version: "0.4.1"
  alternatedomains:
    - plastics-recycling-brokerage
    - plastics

# ---------------------------------------------------------------------------
# ONTOLOGY
# ---------------------------------------------------------------------------
ontology:
  # =========================================================================
  # NODES (flat list with boolean flags)
  # =========================================================================
  nodes:
    # --- CANDIDATE ENTITIES ---
    - label: Facility
      description: "Buyer/processor/compounder/MRF/recycler/broker site"
      managedby: sync
      candidate: true
      queryentity: false
      taxonomy: false
      auxiliary: false
      matchdirection: material_to_facility
      properties:
        - name: facility_id
          type: int
          required: true
        - name: name
          type: string
        - name: lat
          type: float
        - name: lon
          type: float
        - name: state
          type: string
        - name: facility_role
          type: enum
          values: [broker, processor, compounder, mrf, recycler]
        - name: process_type
          type: string
        - name: application_class
          type: string
        - name: gate_mode
          type: string
        - name: min_lot_size_lbs
          type: float
          nullable: true
        - name: max_lot_size_lbs
          type: float
          nullable: true
        - name: min_density
          type: float
          nullable: true
        - name: max_density
          type: float
          nullable: true
        - name: min_mfi
          type: float
          nullable: true
        - name: max_mfi
          type: float
          nullable: true
        - name: contamination_tolerance
          type: float
          nullable: true
        - name: moisture_tolerance
          type: float
          nullable: true
        - name: pvc_tolerant
          type: bool
        - name: can_remove_metal
          type: bool
        - name: can_filter_fr
          type: bool
        - name: accepts_filled_materials
          type: bool
        - name: has_shredder
          type: bool
        - name: has_granulator
          type: bool
        - name: has_wash_line
          type: bool
        - name: has_extruder
          type: bool
        - name: has_sorting_line
          type: bool
        - name: handles_regrind
          type: bool
        - name: handles_flake
          type: bool
        - name: handles_rollstock
          type: bool
        - name: food_grade_certified
          type: bool
        - name: medical_grade_capable
          type: bool
        - name: louvain_community_id
          type: int
          managedby: gds
          description: "Louvain community from TRANSACTED_WITH projection"
        - name: louvain_geo_community_id
          type: int
          managedby: gds
          description: "Geo-augmented Louvain from TRANSACTED_WITH + COLOCATED_WITH"
        - name: onboarded_at
          type: datetime
        - name: last_transaction_at
          type: datetime
        - name: success_rate_90d
          type: float
          managedby: gds
        - name: avg_turnaround_days
          type: float
          managedby: gds
        - name: current_utilization_pct
          type: float
          nullable: true
          description: "open POs / max_monthly_throughput_lbs * 100"

    # --- QUERY ENTITIES ---
    - label: MaterialProfile
      description: "Specific material intake profile with measured physical properties"
      managedby: sync
      candidate: false
      queryentity: true
      taxonomy: false
      auxiliary: false
      matchdirection: material_to_facility
      properties:
        - name: material_id
          type: int
          required: true
        - name: polymer
          type: string
          description: "polymer_id.code from plasticos.material.profile"
        - name: form
          type: string
          description: "form_id.code"
        - name: color
          type: string
        - name: source_type
          type: string
          description: "PCR, PIR, wide-spec"
        - name: mfi
          type: float
          description: "measured melt flow index"
        - name: mfi_min
          type: float
        - name: mfi_max
          type: float
        - name: density
          type: float
        - name: contamination_pct
          type: float
        - name: moisture_pct
          type: float
        - name: filler_pct
          type: float
        - name: filler_type
          type: string
        - name: has_metal
          type: bool
        - name: has_fr
          type: bool
        - name: has_pvc
          type: bool
        - name: quantity_lbs
          type: float
        - name: food_grade
          type: bool
        - name: medical_grade
          type: bool

    # --- TAXONOMY NODES ---
    - label: Polymer
      description: "Specific polymer grade — e.g., HDPE 5502BN"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: PolymerFamily
      description: "Polymer family grouping — HDPE, PP, PET, ABS, etc."
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: MaterialForm
      description: "Physical form — pellet, regrind, flake, bale, rollstock"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: MaterialColor
      description: "Specific color classification"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: SourceType
      description: "Origin class — PCR, PIR, wide-spec"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: ProcessType
      description: "Transformation method — injection, extrusion, blowmold, film, thermoform, compounding"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: name
          type: string
          required: true

    - label: FillerType
      description: "Additive/filler — talc, CaCO3, glass fiber"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: code
          type: string
          required: true

    - label: EquipmentType
      description: "Reified equipment capability"
      managedby: static
      candidate: false
      queryentity: false
      taxonomy: true
      auxiliary: false
      properties:
        - name: name
          type: string
          required: true
          values: [shredder, granulator, wash_line, extruder, sorting_line, regrind_handler, flake_handler, rollstock_handler]
        - name: equipment_class
          type: string
          values: [size_reduction, cleaning, processing, sorting, form_handling]

    # --- AUXILIARY NODES ---
    - label: Market
      description: "Geographic market region"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: false
      auxiliary: true
      properties:
        - name: region
          type: string
          required: true
        - name: name
          type: string
        - name: conforming_limit_usd
          type: float
          nullable: true

    - label: Community
      description: "Louvain community cluster"
      managedby: gds
      candidate: false
      queryentity: false
      taxonomy: false
      auxiliary: true
      properties:
        - name: community_id
          type: int
          required: true

    - label: Grade
      description: "Capability grade / performance archetype"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: false
      auxiliary: true
      properties:
        - name: grade_id
          type: string
          required: true
        - name: polymer_code
          type: string
        - name: mfi_min
          type: float
        - name: mfi_max
          type: float
        - name: max_contamination_pct
          type: float
        - name: max_filler_pct
          type: float
        - name: tier
          type: string
        - name: density_range
          type: string
        - name: active
          type: bool
        - name: louvain_community_id
          type: int
          managedby: gds

    - label: CapabilityProfile
      description: "Facility capability profile node — industrial envelope"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: false
      auxiliary: true
      properties:
        - name: capability_id
          type: string
          required: true

    - label: TransactionOutcome
      description: "Records match outcome — success/failure/partial with quality grade"
      managedby: sync
      candidate: false
      queryentity: false
      taxonomy: false
      auxiliary: true
      properties:
        - name: outcome_id
          type: string
          required: true
        - name: intake_id
          type: int
        - name: facility_id
          type: int
        - name: outcome
          type: enum
          values: [success, failure, partial]
        - name: quality_grade
          type: float
          description: "0.0-1.0"
        - name: turnaround_days
          type: float
        - name: created_at
          type: datetime

  # =========================================================================
  # EDGES (flat list)
  # =========================================================================
  edges:
    # --- CAPABILITY ---
    - type: ACCEPTS_POLYMER
      from: Facility
      to: PolymerFamily
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: ACCEPTS_FORM
      from: Facility
      to: MaterialForm
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: ACCEPTS_COLOR
      from: Facility
      to: MaterialColor
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: ACCEPTS_FILLER
      from: Facility
      to: FillerType
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: HAS_MATERIAL
      from: Facility
      to: MaterialProfile
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: HAS_CAPABILITY
      from: Facility
      to: CapabilityProfile
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: HAS_EQUIPMENT
      from: Facility
      to: EquipmentType
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    # --- TAXONOMY ---
    - type: BELONGS_TO
      from: Polymer
      to: PolymerFamily
      direction: DIRECTED
      category: taxonomy
      managedby: sync
      properties: []

    - type: IS_POLYMER
      from: MaterialProfile
      to: Polymer
      direction: DIRECTED
      category: taxonomy
      managedby: sync
      properties: []

    - type: HAS_FORM
      from: MaterialProfile
      to: MaterialForm
      direction: DIRECTED
      category: taxonomy
      managedby: sync
      properties: []

    - type: OPERATES_PROCESS
      from: Facility
      to: ProcessType
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    # --- MARKET ---
    - type: LOCATED_IN_MARKET
      from: Facility
      to: Market
      direction: DIRECTED
      category: market
      managedby: sync
      properties: []

    # --- TRANSACTION ---
    - type: TRANSACTED_WITH
      from: Facility
      to: Facility
      direction: DIRECTED
      category: transaction
      managedby: sync
      properties:
        - name: txn_count
          type: int
        - name: last_tx_date
          type: datetime
        - name: outcome
          type: string
        - name: created_at
          type: datetime

    - type: BOUGHT_POLYMER
      from: Facility
      to: Polymer
      direction: DIRECTED
      category: transaction
      managedby: customaggregation
      properties:
        - name: txn_count
          type: int
        - name: total_lbs
          type: float
        - name: last_date
          type: datetime

    - type: RECENTLY_TRANSACTED_WITH
      from: Facility
      to: Facility
      direction: DIRECTED
      category: transaction
      managedby: customaggregation
      properties:
        - name: last_txn_date
          type: datetime
        - name: txn_count_90d
          type: int
        - name: recency_score
          type: float
          description: "exp(-age_days / 90.0)"
        - name: total_volume_lbs_90d
          type: float

    # --- EXCLUSION ---
    - type: EXCLUDED_FROM
      from: Facility
      to: Facility
      direction: DIRECTED
      category: exclusion
      managedby: sync
      properties:
        - name: reason
          type: string
        - name: expiry_date
          type: datetime

    # --- PRECOMPUTED (GDS) ---
    - type: STRUCTURALLY_COMPATIBLE
      from: MaterialProfile
      to: Facility
      direction: DIRECTED
      category: precomputed
      managedby: gds
      properties:
        - name: score
          type: float

    - type: SUCCESS_WITH
      from: Facility
      to: Grade
      direction: DIRECTED
      category: precomputed
      managedby: gds
      properties:
        - name: txn_count
          type: int
        - name: last_success_at
          type: datetime
        - name: avg_quality_grade
          type: float

    - type: IN_COMMUNITY
      from: Facility
      to: Community
      direction: DIRECTED
      category: precomputed
      managedby: gds
      properties: []

    - type: COLOCATED_WITH
      from: Facility
      to: Facility
      direction: UNDIRECTED
      category: precomputed
      managedby: customaggregation
      properties:
        - name: distance_km
          type: float
        - name: proximity_score
          type: float
          description: "1.0 / (1.0 + distance_km / 200.0)"

    - type: CAN_RUN
      from: CapabilityProfile
      to: Grade
      direction: DIRECTED
      category: capability
      managedby: sync
      properties: []

    - type: RESULTED_IN
      from: Facility
      to: TransactionOutcome
      direction: DIRECTED
      category: transaction
      managedby: sync
      properties:
        - name: outcome
          type: string
        - name: quality_grade
          type: float
        - name: turnaround_days
          type: float
        - name: created_at
          type: datetime

# ---------------------------------------------------------------------------
# MATCH ENTITIES
# ---------------------------------------------------------------------------
matchentities:
  candidate:
    - label: Facility
      matchdirection: material_to_facility
  queryentity:
    - label: MaterialProfile
      matchdirection: material_to_facility

# ---------------------------------------------------------------------------
# QUERY SCHEMA
# ---------------------------------------------------------------------------
queryschema:
  matchdirections:
    - material_to_facility
  fields:
    - name: intake_id
      type: int
      required: true
    - name: supplier_id
      type: int
      required: true
    - name: material_id
      type: int
      required: true
    - name: polymer
      type: string
      required: true
    - name: form
      type: string
    - name: density
      type: float
    - name: mfi
      type: float
    - name: contamination_pct
      type: float
      default: 0.0
    - name: moisture_pct
      type: float
      default: 0.0
    - name: has_metal
      type: bool
      default: false
    - name: has_fr
      type: bool
      default: false
    - name: has_pvc
      type: bool
      default: false
    - name: filler_pct
      type: float
      default: 0.0
    - name: quantity_lbs
      type: float
      default: 0
    - name: food_grade_required
      type: bool
      default: false
    - name: medical_grade_required
      type: bool
      default: false
    - name: intake_lat
      type: float
    - name: intake_lon
      type: float
    - name: mode
      type: enum
      values: [strict, relaxed]
      default: strict

# ---------------------------------------------------------------------------
# TRAVERSAL
# ---------------------------------------------------------------------------
traversal:
  steps:
    - name: polymer_taxonomy
      description: "Traverse polymer taxonomy to match polymer family"
      pattern: "(f:Facility)-[:ACCEPTS_POLYMER]->(pf:PolymerFamily)<-[:BELONGS_TO]-(p:Polymer {code: $polymer})"
      required: true
      matchdirections:
        - material_to_facility

    - name: structural_compatibility
      description: "Optional structural compatibility edge"
      pattern: "(m:MaterialProfile {material_id: $material_id})-[sc:STRUCTURALLY_COMPATIBLE]->(f)"
      required: false
      matchdirections:
        - material_to_facility

    - name: capability_profile
      description: "Optional capability profile edge"
      pattern: "(f)-[:HAS_CAPABILITY]->(cp:CapabilityProfile)-[:CAN_RUN]->(g:Grade)"
      required: false
      matchdirections:
        - material_to_facility

# ---------------------------------------------------------------------------
# GATES — 14 hard WHERE clause gates
# ---------------------------------------------------------------------------
gates:
  - name: polymer_taxonomy
    description: "Gate 1 — Polymer via taxonomy traversal"
    type: traversal
    pattern: "(f:Facility)-[:ACCEPTS_POLYMER]->(pf:PolymerFamily)<-[:BELONGS_TO]-(p:Polymer {code: $polymer})"
    nullbehavior: fail
    matchdirections:
      - material_to_facility

  - name: density_range
    description: "Gate 2 — Density range"
    type: range
    candidateprop_min: min_density
    candidateprop_max: max_density
    queryparam: density
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: mfi_range
    description: "Gate 3 — MFI range"
    type: range
    candidateprop_min: min_mfi
    candidateprop_max: max_mfi
    queryparam: mfi
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: mfi_process_physics
    description: "Gate 4 — MFI–Process physics"
    type: composite
    logic: OR
    cypheroverride: >
      f.process_type IS NULL OR f.process_type = 'any'
      OR (f.process_type = 'injection' AND $mfi > 10)
      OR (f.process_type = 'extrusion' AND $mfi < 20)
      OR (f.process_type = 'blowmold' AND $mfi > 0.5 AND $mfi < 10)
      OR (f.process_type = 'film' AND $mfi < 5)
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: contamination_tolerance
    description: "Gate 5 — Contamination tolerance"
    type: threshold
    candidateprop: contamination_tolerance
    queryparam: contamination_pct
    operator: ">="
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: moisture_tolerance
    description: "Gate 6 — Moisture tolerance"
    type: threshold
    candidateprop: moisture_tolerance
    queryparam: moisture_pct
    operator: ">="
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: metal_removal
    description: "Gate 7 — Metal removal capability"
    type: boolean
    candidateprop: can_remove_metal
    queryparam: has_metal
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: fr_filtering
    description: "Gate 8 — Flame retardant filtering"
    type: boolean
    candidateprop: can_filter_fr
    queryparam: has_fr
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: wash_line_moisture
    description: "Gate 9 — Wash line (moisture > 0.5% needs wash)"
    type: composite
    cypheroverride: "$moisture_pct <= 0.5 OR f.has_wash_line = true"
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: form_equipment
    description: "Gate 10 — Form–Equipment compatibility"
    type: composite
    cypheroverride: >
      $form IS NULL
      OR ($form = 'regrind' AND f.handles_regrind = true)
      OR ($form = 'flake' AND f.handles_flake = true)
      OR ($form = 'rollstock' AND f.handles_rollstock = true)
      OR ($form = 'pellet')
      OR ($form = 'bale' AND (f.has_shredder = true OR f.has_granulator = true))
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: pvc_tolerance
    description: "Gate 11 — PVC tolerance"
    type: boolean
    candidateprop: pvc_tolerant
    queryparam: has_pvc
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: filler_tolerance
    description: "Gate 12 — Filler tolerance"
    type: composite
    cypheroverride: "$filler_pct = 0 OR f.accepts_filled_materials = true"
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: lot_size
    description: "Gate 13 — Lot size"
    type: range
    candidateprop_min: min_lot_size_lbs
    candidateprop_max: max_lot_size_lbs
    queryparam: quantity_lbs
    nullbehavior: pass
    matchdirections:
      - material_to_facility

  - name: certifications
    description: "Gate 14 — Certifications (food/medical)"
    type: composite
    cypheroverride: >
      (NOT $food_grade_required OR f.food_grade_certified = true)
      AND (NOT $medical_grade_required OR f.medical_grade_capable = true)
    nullbehavior: pass
    matchdirections:
      - material_to_facility

# ---------------------------------------------------------------------------
# SCORING
# ---------------------------------------------------------------------------
scoring:
  dimensions:
    - name: structural_score
      description: "Precomputed structural compatibility MaterialProfile→Facility"
      source: traversalalias
      alias: sc
      candidateprop: score
      computation: traversalalias
      defaultwhennull: 0.5
      weightkey: w_structural
      defaultweight: 0.30
      aggregation: additive
      matchdirections:
        - material_to_facility

    - name: geo_score
      description: "Geographic proximity with configurable decay"
      source: computed
      computation: geodecay
      decayconstant: 800000
      defaultwhennull: 0.5
      weightkey: w_geo
      defaultweight: 0.25
      aggregation: additive
      matchdirections:
        - material_to_facility

    - name: reinforcement_score
      description: "Transaction history with temporal decay (180-day half-life)"
      source: computed
      computation: lognormalized
      expression: "(log(txn_count + 1) / log(1000 + 1)) * recency_weight"
      defaultwhennull: 0.0
      weightkey: w_reinforcement
      defaultweight: 0.20
      aggregation: additive
      matchdirections:
        - material_to_facility

    - name: facility_freshness
      description: "Facility recency signal — 90-day half-life, cold-start default 0.3"
      source: candidateproperty
      candidateprop: last_transaction_at
      computation: temporalproximity
      decayconstant: 90
      defaultwhennull: 0.3
      weightkey: w_freshness
      defaultweight: 0.10
      aggregation: additive
      matchdirections:
        - material_to_facility

    - name: community_bias
      description: "Louvain community coherence — multiplicative modifier"
      source: computed
      computation: communitymatch
      bias: 0.92
      defaultwhennull: 1.0
      weightkey: w_community
      defaultweight: 1.0
      aggregation: multiplicative
      matchdirections:
        - material_to_facility

# ---------------------------------------------------------------------------
# DERIVED PARAMETERS
# ---------------------------------------------------------------------------
derivedparameters:
  - name: contamination_headroom
    expression: "f.contamination_tolerance - $contamination_pct"
    type: float
    description: "How much contamination margin remains"

  - name: mfi_center_fit
    expression: "1.0 - abs($mfi - (f.min_mfi + f.max_mfi) / 2.0) / ((f.max_mfi - f.min_mfi) / 2.0)"
    type: float
    description: "How centered MFI is within facility range"

# ---------------------------------------------------------------------------
# SOFT SIGNALS
# ---------------------------------------------------------------------------
softsignals: []

# ---------------------------------------------------------------------------
# SYNC
# ---------------------------------------------------------------------------
sync:
  endpoints:
    - path: "/v1/sync/facilities"
      method: POST
      targetnode: Facility
      idproperty: facility_id
      batchstrategy: UNWINDMERGE
      taxonomyedges:
        - field: polymer_families
          edgetype: ACCEPTS_POLYMER
          targetlabel: PolymerFamily
          targetid: code
        - field: forms
          edgetype: ACCEPTS_FORM
          targetlabel: MaterialForm
          targetid: code
        - field: colors
          edgetype: ACCEPTS_COLOR
          targetlabel: MaterialColor
          targetid: code

    - path: "/v1/sync/materials"
      method: POST
      targetnode: MaterialProfile
      idproperty: material_id
      batchstrategy: UNWINDMERGE
      taxonomyedges:
        - field: polymer
          edgetype: IS_POLYMER
          targetlabel: Polymer
          targetid: code
        - field: form
          edgetype: HAS_FORM
          targetlabel: MaterialForm
          targetid: code

    - path: "/v1/sync/polymers"
      method: POST
      targetnode: Polymer
      idproperty: code
      batchstrategy: UNWINDMERGE
      taxonomyedges:
        - field: family
          edgetype: BELONGS_TO
          targetlabel: PolymerFamily
          targetid: code

    - path: "/v1/sync/exclusions"
      method: POST
      targetedge: EXCLUDED_FROM
      fromnode: Facility
      tonode: Facility
      batchstrategy: UNWINDMERGE

# ---------------------------------------------------------------------------
# GDS JOBS
# ---------------------------------------------------------------------------
gdsjobs:
  - name: louvain
    algorithm: louvain
    schedule:
      type: cron
      cron: "0 2 * * 0"
    projection:
      nodelabels:
        - Facility
      edgetypes:
        - TRANSACTED_WITH
    writeproperty: louvain_community_id
    writeto: Facility

  - name: structural_precompute
    algorithm: nodeSimilarity
    schedule:
      type: cron
      cron: "0 3 * * *"
    projection:
      nodelabels:
        - MaterialProfile
        - Facility
        - PolymerFamily
      edgetypes:
        - ACCEPTS_POLYMER
        - IS_POLYMER
        - BELONGS_TO
    writeedge: STRUCTURALLY_COMPATIBLE

  - name: reinforcement_rebuild
    algorithm: custom
    schedule:
      type: cron
      cron: "30 3 * * *"
    projection:
      nodelabels:
        - Facility
        - Grade
      edgetypes:
        - TRANSACTED_WITH
    writeedge: SUCCESS_WITH
    recencydecay: true
    recencyhalflifedays: 180

  - name: geo_proximity
    algorithm: custom
    schedule:
      type: cron
      cron: "15 3 * * 0"
    projection:
      nodelabels:
        - Facility
      edgetypes: []
    writeedge: COLOCATED_WITH

  - name: louvain_geo
    algorithm: louvain
    schedule:
      type: cron
      cron: "30 3 * * 0"
    projection:
      nodelabels:
        - Facility
      edgetypes:
        - TRANSACTED_WITH
        - COLOCATED_WITH
    writeproperty: louvain_geo_community_id
    writeto: Facility

# ---------------------------------------------------------------------------
# KGE (disabled for now)
# ---------------------------------------------------------------------------
kge:
  model: CompoundE3D
  embeddingdim: 300
  trainingrelations:
    - ACCEPTS_POLYMER
    - ACCEPTS_FORM
    - ACCEPTS_COLOR
    - OPERATES_PROCESS
    - LOCATED_IN_MARKET
    - TRANSACTED_WITH
    - STRUCTURALLY_COMPATIBLE
    - SUCCESS_WITH

# ---------------------------------------------------------------------------
# COMPLIANCE
# ---------------------------------------------------------------------------
compliance:
  regimes:
    - name: plastics_recycling
      description: "Plastics recycling industry compliance"
  prohibitedfactors:
    enabled: true
    blockedfields: []
    enforcement: compiletime
    auditonviolation: true
  audit:
    enabled: true
    logmatchrequests: true
    logmatchresults: true
    logsyncoperations: true
    logadminoperations: true
    retentiondays: 90
  pii:
    enabled: false
    fields: []
    candidatefields: []
    handling: hash
    encryptionkeysource: env
  retention:
    transactionttldays: 365
    auditttldays: 90

# ---------------------------------------------------------------------------
# FEEDBACK LOOP CONFIGURATION
# ---------------------------------------------------------------------------
feedbackloop:
  enabled: true
  signal_weights:
    enabled: true
    recalculation_cadence_days: 30
    min_outcomes_for_recalculation: 50
    baseline_weight: 1.0
    max_weight: 3.0
    min_weight: 0.1
    frequency_adjustment: true
    confidence_dampening: true
    penalty_threshold: 0.5
    penalty_factor: 0.3
  propagation_boost_factor: 1.15
  propagation_similarity_threshold: 0.4
  outcome_edge_type: RESULTED_IN
  outcome_node_label: TransactionOutcome
  drift_threshold: 0.15
  drift_window_days: 30

# ---------------------------------------------------------------------------
# CAUSAL EDGE CONFIGURATION
# ---------------------------------------------------------------------------
causal:
  enabled: true
  attribution_enabled: true
  counterfactual_enabled: true
  temporal_decay_enabled: false
  chain_depth_limit: 5
  causal_edges:
    - edge_type: RESULTED_IN
      source_label: TransactionOutcome
      target_label: Facility
      temporal_validation: true
      confidence_threshold: 0.0
    - edge_type: CAUSED_BY
      source_label: TransactionOutcome
      target_label: TransactionOutcome
      temporal_validation: true
      confidence_threshold: 0.5

# ---------------------------------------------------------------------------
# ENTITY RESOLUTION / SEMANTIC REGISTRY
# ---------------------------------------------------------------------------
semantic_registry:
  enabled: true
  entity_labels:
    - Facility
  similarity_threshold: 0.85
  property_weight: 0.5
  structural_weight: 0.3
  behavioral_weight: 0.2
  comparison_properties:
    - name
    - state
    - facility_role
    - process_type
  max_candidates: 20

# ---------------------------------------------------------------------------
# COUNTERFACTUAL CONFIGURATION
# ---------------------------------------------------------------------------
counterfactual:
  enabled: true
  max_scenarios_per_outcome: 3
  min_confidence: 0.3
  comparison_pool_size: 10
